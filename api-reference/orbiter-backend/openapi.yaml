        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: WorkOS access token returned by /sign-in or /verify-email.
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
    ErrorDetail:
      type: object
      required:
        - field
        - issue
      properties:
        field:
          type: string
        issue:
          type: string
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine code — NOT_FOUND / VALIDATION_FAILED / CONFLICT / UNAUTHORIZED / FORBIDDEN / INTERNAL.
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        debug:
          type:
            - string
            - 'null'
          description: Wrapped technical cause; present only in debug mode.
    ErrorEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      description: Error response — data is always null.
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/Meta'
    EmptyEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      description: Success with no payload (e.g. deletes) — data and error are null.
      properties:
        data:
          type: 'null'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    CompanyRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        company_name:
          type: string
        logo:
          type:
            - string
            - 'null'
    LocationRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        formatted_location:
          type:
            - string
            - 'null'
    ConnectionRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_from_id:
          type:
            - string
            - 'null'
          format: uuid
        user_to_id:
          type:
            - string
            - 'null'
          format: uuid
        request_message:
          type:
            - string
            - 'null'
        declined:
          type: boolean
        from_blocked:
          type: boolean
        connected_at:
          type:
            - string
            - 'null'
          format: date-time
        accept_message:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Connection:
