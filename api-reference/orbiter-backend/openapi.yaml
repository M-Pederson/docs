          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddTeamMembersRequest'
      responses:
        '201':
          description: The members added (already-members omitted).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddTeamMembersResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /teams/{team_id}/members/{member_id}:
    patch:
      tags:
        - Teams
      summary: Update a team member
      description: |
        Partial update of a membership. `is_admin` may only be changed by a team
        admin; `is_favourite` only by the member themselves (their own row). At
        least one field is required.
      operationId: patchTeamMember
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: member_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTeamMemberRequest'
      responses:
        '200':
          description: The updated membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Teams
      summary: Remove a team member
      description: |
        Removes a member from a team. A team admin may remove anyone; a member
        may remove themselves (leave). Others get 403.
      operationId: removeTeamMember
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: member_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /teams/{team_id}/members/{member_id}/invitation:
    put:
      tags:
        - Teams
      summary: Respond to a team invitation
      description: |
        The invitee accepts or rejects their own pending invitation. Only the
        invitee may respond (others get 404); an already-answered invite gives 409.
      operationId: respondTeamInvitation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: member_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RespondInvitationRequest'
      responses:
        '200':
          description: The updated membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /team-contains:
    get:
      tags:
        - Teams
      summary: List teams shared with another user
      description: |
        Returns the teams the authenticated caller and the queried `user_id` are
        BOTH accepted members of (the intersection), newest first. Each item
        carries the team's member count and the caller's own membership. Empty
        when they share no teams.
      operationId: listSharedTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
          description: The other user to intersect the caller's teams with.
      responses:
        '200':
          description: The teams the caller and the queried user share.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharedTeamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /team-favourites:
    get:
      tags:
        - Teams
      summary: List the caller's favourited teams
      description: |
        Returns the teams the authenticated caller has favourited (accepted
        membership with is_favourite=true), in the caller's custom order
        (membership position ascending). Optionally filtered by a case-insensitive
        title substring. Unpaginated. Each item is the same shape as a GET /teams
        item — every one is, by definition, a favourite.
      operationId: listFavouriteTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Case-insensitive team-title substring filter.
      responses:
        '200':
          description: The caller's favourited teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavouriteTeamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    patch:
      tags:
        - Teams
      summary: Toggle a team as a favourite
      description: |
        Sets the authenticated caller's `is_favourite` flag on their own
        membership in the team named by `team_id`, and maintains the contiguous
        position order their favourites list relies on: favouriting appends the
        team to the end of their favourites (keeping its place if already a
        favourite); unfavouriting clears its slot and re-compacts the rest.
        Returns the updated membership. 404 when the caller is not a member.
      operationId: patchTeamFavourite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTeamFavouriteRequest'
      responses:
        '200':
          description: The updated membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /team-favourites/reorder:
    patch:
      tags:
        - Teams
      summary: Reorder the caller's favourite teams
      description: |
        Assigns the caller's favourited teams the order given by `team_ids` (first
        → position 0, second → 1, …). Every id must be one of the caller's
        favourited teams; a non-matching id rejects the whole request (400) and
        nothing changes (applied atomically). Duplicate ids are rejected.
      operationId: reorderFavouriteTeams
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderFavouritesRequest'
      responses:
        '200':
          description: Reorder applied.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReorderFavouritesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /team-questions:
    post:
      tags:
        - Teams
      summary: Ask a team question
      description: |
        Records a question asked against a team. The asker is taken from the
        verified session, not the body. The caller must be an accepted member of
        the team (non-members get 404, pending invitees 403). `team_question_id`
