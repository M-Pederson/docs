            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamQuestionRequest'
      responses:
        '200':
          description: The updated team question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamQuestionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-questions:
    get:
      tags:
        - Collections
      summary: List the caller's questions on a collection
      description: |
