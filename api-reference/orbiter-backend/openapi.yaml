        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        next_cursor:
          type: string
          description: Opaque cursor; omitted/empty when no further pages exist.
    ListFilesResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/ListFilesResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    CreateFileRequest:
      type: object
      required:
        - gcs_uri
        - file_source
        - data_source
      properties:
        gcs_uri:
          type: string
          description: |
            Full GCS URI of the uploaded object (e.g. `gs://bucket/path/to.pdf`).
            The worker reads metadata (name, mime, size) from the object.
        file_source:
          type: string
          maxLength: 255
          description: Free-form source label, e.g. "linkedin-import", "manual-upload".
        data_source:
          type: string
          maxLength: 64
          description: |
            Xano datasource scope — live | staging | sandbox | etc.
            Required because every file currently originates from a Xano-managed source.
        xano_user_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano user id pass-through. Body wins over JWT when both are present.
        file_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano file id pass-through (round-tripped to webhooks).
        suggestion_request_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano suggestion-request id (only set for suggestion-flow ingestions).
    FileResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/FileResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    UploadFileRawRequest:
      type: object
      required:
        - file_source
        - data_source
        - file
      description: |
        Raw direct-upload body. No markdown — the worker extracts. The `file`
        part must be sent LAST (streamed to GCS in one pass).
      properties:
        file_source:
          type: string
          maxLength: 255
          description: Free-form source label, e.g. "manual-upload".
        data_source:
          type: string
          maxLength: 64
          description: Xano datasource scope — live | staging | sandbox | etc.
        xano_user_id:
          type: integer
          format: int64
          description: Optional Xano user id pass-through.
        file_id:
          type: integer
          format: int64
          description: Optional Xano file id pass-through.
        suggestion_request_id:
          type: integer
          format: int64
          description: Optional Xano suggestion-request id pass-through.
        file:
          type: string
          format: binary
          description: The file bytes to upload. Send this part LAST.
    UploadFileMarkdownRequest:
      description: |
        Raw upload body plus pre-extracted `markdown`; when present the worker
        stores it and skips re-extraction.
      allOf:
        - $ref: '#/components/schemas/UploadFileRawRequest'
        - type: object
          properties:
            markdown:
              type: string
              description: Pre-extracted document markdown.
    UploadFileResponse:
      description: |
        FileResponse plus the document markdown — extracted synchronously by
        the raw endpoint, or echoed from the supplied value by the markdown
        endpoint. List/get responses omit markdown to stay lean.
      allOf:
        - $ref: '#/components/schemas/FileResponse'
        - type: object
          required:
            - markdown
          properties:
            markdown:
              type: string
    UploadFileResponseEnvelope:
      type: object
      required:
