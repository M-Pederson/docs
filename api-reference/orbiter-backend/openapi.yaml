openapi: 3.1.0
info:
  title: Orbiter API
  version: 0.1.0
  license:
    name: Proprietary
  description: |
    HTTP API for Orbiter. All endpoints are versioned under /v1/.

    This file is the root of the spec — paths are composed from
    per-feature fragments (`<feature>.openapi.yaml`) via $ref so each
    feature's contract lives next to its name. Shared schemas
    (Error, responses, security) stay here so every feature picks
    them up without duplication.

    To bundle into a single deployable file (e.g. for Swagger UI,
    Postman import, or openapi-generator):

        npx @redocly/cli bundle api/openapi.yaml -o api/dist/openapi.yaml
servers:
  - url: http://localhost:8080/v1
    description: Local
  - url: https://orbiter-backend-git-20506320032.us-central1.run.app/v1
    description: Staging (Cloud Run)
tags:
  - name: Auth
    description: Sign-up, sign-in, refresh, email verification, OAuth.
  - name: Users
    description: User CRUD. Requires a verified WorkOS access token.
  - name: Admin
    description: Operator-only utilities. Add an auth guard before production use.
  - name: Files
    description: |
      File-ingestion pipeline. Register a GCS object and the worker
      extracts → classifies → optionally builds a pitch profile.
  - name: Webhooks
    description: |
      Outbound webhook subscriptions, delivery inspection, and
      manual retry of dead deliveries.
  - name: Notes
    description: Notes CRUD. Requires a verified WorkOS access token.
  - name: Emails
    description: Email-template CRUD. Requires a verified WorkOS access token.
  - name: Travels
    description: Travels CRUD. Requires a verified WorkOS access token.
  - name: Activities
    description: |
      Contact activity orbits — email and calendar-event feeds sourced from
      Nylas. Cursor-paginated, owner-scoped. Requires a verified WorkOS token.
  - name: Teams
    description: Teams listing. Requires a verified WorkOS access token.
  - name: Persons
    description: Person browse and detail. Requires a verified WorkOS access token.
  - name: Contacts
    description: The caller's saved contacts (CRM). Add contacts and list with detail. Requires a verified WorkOS access token.
  - name: Companies
    description: Company browse and detail. Requires a verified WorkOS access token.
  - name: Company Contacts
    description: The caller's saved companies. Requires a verified WorkOS access token.
  - name: MergeSuspects
    description: Suspected duplicate contacts for user review.
  - name: Collections
    description: Collections CRUD. Requires a verified WorkOS access token.
  - name: Discover
    description: Deep-research records. Requires a verified WorkOS access token.
  - name: FalkorDB
    description: Graph-instance credentials CRUD. Requires a verified WorkOS access token.
  - name: Organizations
    description: Organization creation and WorkOS mirroring. Requires a verified WorkOS access token.
  - name: NylasGrants
    description: Nylas OAuth grants — connected email accounts.
  - name: EmailWorkspaces
    description: Email workspace profiles grouping connected accounts.
  - name: EmailFolders
    description: Email folder/label management via Nylas.
  - name: EmailThreads
    description: Email thread listing and detail via Nylas.
  - name: EmailSummary
    description: AI-generated email thread summaries.
  - name: Calendars
    description: Calendar and event management via Nylas.
  - name: GetStream
    description: Inbound Stream Chat (GetStream) webhooks recording chat messages as comments.
paths:
  /sign-up:
    post:
      tags:
        - Auth
      summary: Sign up
      description: |
        Creates a WorkOS identity, mints the local users.users row, and
        fans out provisioning side-effects (Knock identify, personal org,
        graph node) via Pub/Sub. WorkOS emails a verification code and the
        response carries a `pending_authentication_token`: the client posts
        that token plus the code to /verify-email to verify and log in (no
        second sign-in round-trip). If verification isn't required, `tokens`
        is returned directly and the user is already logged in.
      operationId: signUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User created (verification pending, or logged in).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignUpResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in:
    post:
      tags:
        - Auth
      summary: Sign in
      description: |
        Authenticates against WorkOS. Returns an access/refresh token pair
        on success. If the user's email isn't verified, returns 403 with a
        pending_authentication_token the frontend uses to drive the
        verify-email flow. If the user belongs to multiple organizations,
        returns 403 with the organization list to drive the select-org flow.
      operationId: signIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Email verification or organization selection required.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/EmailVerificationRequiredResponseEnvelope'
                  - $ref: '#/components/schemas/OrganizationSelectionRequiredResponseEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in/refresh:
    post:
      tags:
        - Auth
      summary: Refresh tokens
      description: Exchange a refresh token for a new access/refresh pair
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Refresh token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in/select-organization:
    post:
      tags:
        - Auth
      summary: Select an organization
      description: |
        Submits the chosen organization id together with the
        pending_authentication_token returned by /sign-in for a multi-org
        user. On success returns the same AuthTokens shape as /sign-in.
      operationId: selectOrganization
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectOrganizationRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired pending token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-out:
    post:
      tags:
        - Auth
      summary: Sign out
      description: |
        Revokes the WorkOS session identified by the access token's `sid`
        claim, so its refresh token can no longer mint new access tokens.
        Best-effort and idempotent; the frontend discards its stored tokens
        and redirects to login on the 204.
      operationId: signOut
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session revoked (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /verify-email:
    post:
      tags:
        - Auth
      summary: Verify email
      description: |
        Submits the code from the verification email together with the
        pending_authentication_token returned by /sign-in. On success
        returns the same AuthTokens shape as /sign-in.
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Verified and authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired verification code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /send-verification-email:
    post:
      tags:
        - Auth
      summary: Send verification email
      description: (Re)send the verification email
      operationId: sendVerificationEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '200':
          description: Email dispatched (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /forgot-password:
    post:
      tags:
        - Auth
      summary: Request password reset
      description: |
        Triggers WorkOS to create a one-time reset token and email the
        user a reset link. Always returns 200, even for an unregistered
        email, so the endpoint can't be used to probe which addresses
        exist. The emailed link points at the frontend reset page with a
        `?token=` query param, which is submitted to /reset-password.
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email dispatched if the address is registered (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /reset-password:
    post:
      tags:
        - Auth
      summary: Reset password
      description: |
        Submits the token from the reset email together with the new
        password. WorkOS sets the password (and verifies the email if it
        wasn't). No session is returned — the client signs in afterward.
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password updated (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired reset token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /oauth/{provider}/start:
    get:
      tags:
        - Auth
      summary: Start OAuth sign-in
      description: |
        Returns the WorkOS authorization URL the browser should navigate to.
        WorkOS redirects back to the frontend /auth/callback route with
        state + code, which the frontend forwards to /oauth/callback.
      operationId: oauthStart
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum:
              - google
              - github
          description: OAuth provider (must be present in OAUTH_ALLOWED_PROVIDERS).
      responses:
        '200':
          description: Authorization URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /oauth/callback:
    get:
      tags:
        - Auth
      summary: Complete OAuth sign-in
      description: |
        The frontend /auth/callback page forwards the WorkOS `code` and
        `state` here. We verify state, exchange the code for a session, and
        return the standard AuthTokens envelope.
      operationId: oauthCallback
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: State mismatch or code exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: |
            User belongs to multiple organizations and must choose one.
            Redeem the returned pending_authentication_token via
            /sign-in/select-organization to finish authentication.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSelectionRequiredResponseEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: List users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: query
          description: |
            People-picker search: case-insensitive match on the linked master
            person's full name or the username. When present, the response is
            SearchUsersResponseEnvelope (active users with a linked master
            person only) and `offset` is ignored.
          schema:
            type: string
      responses:
        '200':
          description: One page of users; search rows when `query` is present.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ListUsersResponseEnvelope'
                  - $ref: '#/components/schemas/SearchUsersResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /users/me:
    get:
      tags:
        - Users
      summary: Get my profile
      description: |
        Returns the current user with the JWTs the frontend needs, their
        own person (person.my_person carries the contact-row
        id, null when not in contacts), and connected email accounts.
        The id comes from the session token, never the URL.
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated authenticated user's composed profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserID'
    get:
      tags:
        - Users
      summary: Get one user
      description: Get a user by id
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Users
      summary: Delete a user
      description: |
        Cascades to user_settings, user_roles, user_consumption_level, and
        organization_memberships.
      operationId: deleteUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /users/{id}/jwts/regenerate:
    get:
      tags:
        - Admin
      summary: Regenerate vendor JWTs
      description: |
        Dev/admin utility — currently mounted on the public group. Add an
        auth guard before production use.
      operationId: regenerateJWTs
      security: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: New JWTs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /admin/provisioning-events/{id}/retry:
    post:
      tags:
        - Admin
      summary: Retry a provisioning event
      description: |
        Resets the row's status and republishes the message on the
        user-provisioning-events topic. Already-succeeded rows return 400.
      operationId: retryProvisioningEvent
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Republished attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningEventResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /admin/users/external-id:
    post:
      tags:
        - Admin
      summary: Set a WorkOS external id
      description: |
        Sets external_id on the WorkOS user so access tokens carry the
        urn:orbiter:user_id claim. Backfill / repair tool.
      operationId: setUserExternalID
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetExternalIDRequest'
      responses:
        '200':
          description: external_id updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /users/webhooks/workos:
    post:
      tags:
        - Users
      summary: 'Webhook: WorkOS users'
      description: |
        Receives WorkOS `user.*` events. `user.created` provisions the
        local user row and fires the first-auth fan-out (Knock identify,
        personal org, user graph), so invited users exist locally before
        their first sign-in. Other event types return 200 with action
        "ignored". Verified via the `WorkOS-Signature` HMAC header, not
        a bearer token. Idempotent — an already-provisioned user returns
        action "existing".
      operationId: workosUserWebhook
      security: []
      parameters:
        - in: header
          name: WorkOS-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw WorkOS event envelope ({ event, data }).
      responses:
        '200':
          description: Event processed (or ignored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserWebhookResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations:
    get:
      tags:
        - Organizations
      summary: Get all organizations
      description: |
        Every organization the authenticated user belongs to, each enriched with the
        authenticated user's role, membership status and WorkOS membership id. Flat
        list (no pagination) — a single user's organization count is
        always small. Sorted by name.
      operationId: listOrganizations
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The authenticated user's organizations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrganizationsResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Organizations
      summary: Create a organization
      description: |
        Creates a team organization owned by the authenticated user:
        the org row, an owner membership, and the optionally claimed
        domain are written in one transaction, then mirrored to WorkOS
        (org + admin membership) and a per-org FalkorDB graph is
        provisioned — both best-effort: an outage does not fail the
        request; `workos_organization_id` stays null until a later sync
        backfills it. Personal organizations cannot be created here;
        they are provisioned automatically at sign-up.
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Created organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/{organization_id}:
    get:
      tags:
        - Organizations
      summary: Get one organization
      description: |
        Returns the organization, its claimed domains, and all
        memberships. The authenticated user must be a member.
      operationId: getOrganization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The organization with memberships.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationDetailResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Organizations
      summary: Update a organization
      description: |
        Edits the organization's name and/or claimed domain, then mirrors
        the change to WorkOS and the org graph (best-effort). Omitted
        fields are unchanged; `domain: ""` clears the claimed domains.
        Only owner/admin members may edit. `is_personal` is immutable.
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrganizationRequest'
      responses:
        '200':
          description: Updated organization.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Organizations
      summary: Delete a organization
      description: |
        Deletes the organization everywhere: WorkOS first (remote
        failure aborts), then the per-org graph and each member's
        :OrgMembership node, then the local row (memberships and domains
        cascade). Only owner/admin members may delete; personal
        organizations cannot be deleted.
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/{organization_id}/soft-delete:
    post:
      tags:
        - Organizations
      summary: Soft-delete an organization
      description: |
        Marks the organization deleted (sets `deleted_at`) without tearing
        anything down. The row, its WorkOS/graph mirrors, and all org-scoped
        data survive — a reaper hard-deletes past the retention window.
        Soft-deleted orgs disappear from all read endpoints. Only owner/admin
        members may delete; personal organizations cannot be deleted.
      operationId: softDeleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Soft-deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/{organization_id}/organization-memberships:
    get:
      tags:
        - Organizations
      summary: Get all members
      description: |
        Returns every membership for the organization, each row enriched
        with the member's person summary (`person`, null
        when the user isn't linked to a person). The authenticated user must be a
        member, else 403 — rosters are not enumerable by non-members.
      operationId: listOrganizationMemberships
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The organization's membership roster.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMembershipsEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Organizations
      summary: Add a member
      description: |
        Adds a user to the organization, then mirrors the membership to
        WorkOS and upserts the membership graph edges — both best-effort:
        the mirror only runs when the member has a WorkOS identity and
        the org has a WorkOS id, and a vendor outage does not fail the
        request (`workos_membership_id` stays null until a later sync).
        Only owner/admin members may add members.
      operationId: addOrganizationMembership
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMembershipRequest'
      responses:
        '201':
          description: Created membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/{organization_id}/organization-memberships/{membership_id}:
    put:
      tags:
        - Organizations
      summary: Update a membership
      description: |
        Updates the membership's role and/or status (omitted fields are
        unchanged). A role change is best-effort mirrored to WorkOS and the
        membership graph edge is re-upserted. Only owner/admin members may
        edit memberships. An edit that would leave the organization with no
        active owner/admin is rejected with 409 — assign another admin first.
      operationId: updateOrganizationMembership
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: membership_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMembershipRequest'
      responses:
        '200':
          description: Updated membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Organizations
      summary: Remove a member
      description: |
        Deletes the membership everywhere: WorkOS first (a remote failure
        aborts so we never orphan a live WorkOS membership), then the
        member's :Member and :OrgMembership graph nodes (best-effort), then
        the local row. Only owner/admin members may remove members, and the
        organization's last active owner/admin cannot be removed — assign
        another admin first (409).
      operationId: deleteOrganizationMembership
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: membership_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/{organization_id}/organization-memberships/{membership_id}/role:
    patch:
      tags:
        - Organizations
      summary: Change a member's role
      description: |
        Updates only the membership's role, best-effort syncs it to WorkOS,
        and re-upserts the membership graph edge. Only owner/admin members
        may change roles. Demoting the organization's last active owner/admin
        is rejected with 409 — assign another admin first.
      operationId: updateOrganizationMembershipRole
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: membership_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMembershipRoleRequest'
      responses:
        '200':
          description: Updated membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/{organization_id}/organization-memberships/{membership_id}/status:
    patch:
      tags:
        - Organizations
      summary: Change a member's status
      description: |
        Deactivates or reactivates a membership. WorkOS is called first and
        a vendor failure aborts the request — the local status is never
        flipped while WorkOS still disagrees. WorkOS emits an
        organization_membership.updated event on success. Only owner/admin
        members may change status. Deactivating the organization's last
        active owner/admin is rejected with 409 — assign another admin first.
      operationId: setOrganizationMembershipStatus
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: organization_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: membership_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetMembershipStatusRequest'
      responses:
        '200':
          description: Updated membership.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/backfill/workos:
    post:
      tags:
        - Organizations
      summary: 'Backfill: WorkOS orgs'
      description: |
        Re-runs the full sync chain (WorkOS org + per-org graph +
        membership + membership edges) for organizations where
        `workos_organization_id` is null. Idempotent; safe to repeat
        until `scanned` is 0.
      operationId: backfillOrganizationsWorkOS
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Backfill counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/backfill/graphs:
    post:
      tags:
        - Organizations
      summary: 'Backfill: org graphs'
      description: |
        Provisions the per-org graph (:Organization node, master mirror,
        membership edges) for organizations that have a WorkOS id but a
        null `graph_id`. Idempotent; safe to repeat until `scanned` is 0.
      operationId: backfillOrganizationGraphs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
