                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-contains:
    get:
      tags:
        - Collections
      summary: Collections that contain an entity
      description: |
        Returns the caller's own collections that pin a given person or company,
        each with its total node count and the id of the node that links the
        entity. Provide exactly one of master_person_id / master_company_id.
        Owner-scoped — shared collections are not included.
      operationId: listCollectionsContaining
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: master_person_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: master_company_id
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The caller's collections that contain the entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionsContainingResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-comments:
    get:
      tags:
        - Collections
      summary: List a collection's comments
      description: |
        Returns a collection's comments, newest first, each enriched with its
        author (master_person name + avatar) and the reactions on it. The caller
        must have access to the collection.
      operationId: listCollectionComments
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The collection's comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionCommentsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Collections
      summary: Comment on a collection
      description: |
        Adds a comment to a collection, authored by the caller. The caller must
        have access to the collection.
      operationId: createCollectionComment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionCommentRequest'
      responses:
        '201':
          description: The created comment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionCommentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-comments/{collection_comment_id}:
    put:
      tags:
        - Collections
      summary: Edit a comment
      description: |
        Edits a comment's text. Only the comment's author may edit it; an unknown
        comment or one the caller didn't write returns 404.
      operationId: updateCollectionComment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_comment_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionCommentRequest'
      responses:
        '200':
          description: The updated comment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionCommentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Collections
      summary: Delete a comment
      description: |
        Deletes a comment. Only the comment's author may delete it; an unknown
        comment or one the caller didn't write returns 404.
      operationId: deleteCollectionComment
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_comment_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Comment deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-favourites:
    get:
      tags:
        - Collections
      summary: List the caller's favourite collections
      description: |
        Returns a page of the collections the caller has favourited, in their
        chosen favourite order (collection_favourite.position). Each item carries
        its node count, the teams it's shared through, and the caller's own
        questions — the same shape as GET /collections. `query` is a
        case-insensitive title substring search.
      operationId: listCollectionFavourites
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of the caller's favourite collections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Collections
      summary: Favourite a collection
      description: |
        Adds a collection to the caller's favourites (idempotent — re-favouriting
        returns the existing entry). A new favourite is appended to the end of
        the list. The caller must have access to the collection.
      operationId: addCollectionFavourite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollectionFavouriteRequest'
      responses:
        '201':
          description: The favourite (existing or new).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionFavouriteEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Collections
      summary: Unfavourite a collection
      description: |
        Removes a collection from the caller's favourites and re-compacts the
        remaining positions to a dense 0,1,2… order. Idempotent — succeeds even
        if the collection wasn't favourited.
      operationId: removeCollectionFavourite
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Unfavourited (or was not a favourite).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-favourites/reorder:
    patch:
      tags:
        - Collections
      summary: Reorder the caller's favourites
      description: |
        Sets the caller's favourites to the submitted order — each collection's
        position becomes its index in collection_ids. Every id must already be
        one of the caller's favourites; otherwise the whole reorder is rejected.
      operationId: reorderCollectionFavourites
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderCollectionFavouritesRequest'
      responses:
        '200':
          description: Favourites reordered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /collections:
    get:
      tags:
        - Collections
      summary: List the caller's collections
      description: |
        Returns a page of the collections the authenticated caller can see —
        ones they own or ones shared with them via a collection join —
        newest-activity first. Each item carries its node count, the teams it's
        shared through (an array; a collection can be shared through several),
        and the caller's own questions on it. `with_favourites=false` excludes
        the caller's favourited collections; `query` is a case-insensitive title
        substring search.
      operationId: listCollections
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Case-insensitive collection-title substring filter.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (per_page).
        - in: query
          name: with_favourites
          required: false
          schema:
            type: boolean
            default: true
          description: When false, excludes the caller's favourited collections.
      responses:
        '200':
          description: A page of the caller's collections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Collections
      summary: Create a collection
      description: |
        Creates a collection owned by the authenticated caller. The owner is
        taken from the verified session (urn:orbiter:user_id claim), not the
        body. When `team_id` is given, every other member of that team is added
        to the collection (the creator is the owner, not a member row), and each
        newly-added member receives a notification. Returns the created
        collection.
      operationId: createCollection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '201':
          description: Created collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /collections/{collection_id}:
    get:
      tags:
        - Collections
      summary: Get a collection
      description: |
        Returns a single collection the caller can see (owns or is shared with),
        enriched with its node count, the teams it's shared through, and the
        caller's own questions on it. An unknown or inaccessible collection
        returns 404 (existence isn't leaked).
      operationId: getCollection
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionListItemEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Collections
      summary: Update a collection
      description: |
        Full replace of a collection's editable fields. Only the collection's
        owner may update it — a member who was shared the collection gets 403,
        and an unknown or inaccessible collection returns 404 (existence isn't
        leaked).
      operationId: updateCollection
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionRequest'
      responses:
        '200':
          description: The updated collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Collections
      summary: Delete a collection
      description: |
        Deletes a collection and all of its contents (members, nodes,
        questions, comments, reactions, favourites cascade; node ratings and
        assignments are cleared too). Only the owner may delete — a member gets
        403, and an unknown or inaccessible collection returns 404.
      operationId: deleteCollection
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collection deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-members:
    get:
      tags:
        - Collections
      summary: List the teams a collection is shared with
      description: |
        Returns the distinct teams an existing collection is shared through
        (collection_join.team_id). The caller must have access to the collection;
        an unknown or inaccessible one returns 404.
      operationId: listCollectionTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The teams the collection is shared with.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionTeamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Collections
      summary: Share a collection with a team
      description: |
        Invites a team's other members to an existing collection (idempotent —
        members already on it are skipped). The inviter is the session caller;
        newly-added members get a best-effort notification. The caller must have
        access to the collection. Returns the count newly invited.
      operationId: shareCollectionWithTeam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareCollectionWithTeamRequest'
      responses:
        '200':
          description: Team members invited.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareCollectionWithTeamResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Collections
      summary: Un-share a collection from a team
      description: |
        Removes every membership a collection gained through a team (direct
        invites are untouched). The caller must have access to the collection.
        Idempotent — removing a team that wasn't sharing it still succeeds.
      operationId: unshareCollectionTeam
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Team un-shared (or was not sharing it).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-nodes:
    get:
      tags:
        - Collections
      summary: List a collection's nodes
      description: |
        Returns a page of the nodes pinned to a collection, newest first, each
        enriched with the person or company it points at (graph-only entities —
        funding_round, film_tv, film_tv_award, live_event — have no backing table
        and surface as bare ids). The caller must have access to the collection;
        an unknown or inaccessible one returns 404.
      operationId: listCollectionNodes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of enriched collection nodes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionNodesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Collections
      summary: Add nodes to a collection
      description: |
        Bulk-pins entities to a collection as nodes. Each id in each list becomes
        one node; an entity already pinned to the collection is skipped
        (idempotent). Anyone with access to the collection (owner or member) may
        add. master_* are UUIDs; the rest are bare graph ids. Returns the count
        of nodes newly added.
      operationId: addCollectionNodes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollectionNodesRequest'
      responses:
        '201':
          description: Nodes added (count of new ones).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddCollectionNodesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-nodes/move:
    post:
      tags:
        - Collections
      summary: Move nodes to another collection
      description: |
        Moves the listed nodes into collection_id. The caller must have access to
        the target collection and to every node's source collection. A node whose
        entity is already pinned to the target is merged (its source row is
        removed) rather than duplicated. Returns how many nodes were moved vs
        merged. Unknown ids are skipped; 404 when the target/a source is
        inaccessible or no nodes were found.
      operationId: moveCollectionNodes
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveCollectionNodesRequest'
      responses:
        '200':
          description: Move outcome (moved + merged counts).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoveCollectionNodesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-nodes/{collection_node_id}/assign:
    post:
      tags:
        - Collections
      summary: Assign a node to a user
      description: |
        Assigns a collection node to a user, in a labelled context. The recipient
        (user_id) and label come from the body; the assigner is the session
        caller. The caller must have access to the node's collection. Idempotent:
        re-assigning the same (node, user) refreshes the label/assigner.
      operationId: assignCollectionNode
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_node_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignCollectionNodeRequest'
      responses:
        '201':
          description: Assignment created (or refreshed).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionNodeAssignmentEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-nodes/{collection_node_id}/ratings:
    post:
      tags:
        - Collections
      summary: Rate a node
      description: |
        Records a 1-5 rating for the node on behalf of user_id (the session
        caller is the authoriser), then recomputes the node's aggregate score
        (collection_node.rating = mean rounded to 1dp) and returns the new
        average + distinct-rater count. The caller must have access to the node's
        collection. Idempotent: re-rating the same (node, user) replaces the
        prior score.
      operationId: rateCollectionNode
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_node_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateCollectionNodeRequest'
      responses:
        '201':
          description: Rating recorded; node aggregate returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionNodeRatingSummaryEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-nodes/{node_id}:
    delete:
      tags:
        - Collections
      summary: Remove a node from a collection
      description: |
        Deletes a single collection node (and its rating/assignment rows). The
        caller must have access to the node's collection; an unknown or
        inaccessible node returns 404.
      operationId: deleteCollectionNode
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: node_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Node deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /discover:
    get:
      tags:
        - Discover
      summary: List the caller's discover records
      description: |
        Returns a page of the caller's own, non-archived discover records,
        newest-activity first. Each item carries its answer-node count and its
        follow-up questions. The edges / path_keys graph blobs are omitted from
        the list (they belong to a detail view). `query` is a case-insensitive
        substring search over the research text.
      operationId: listDiscover
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of the caller's discover records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDiscoverEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /discover/{discover_id}:
    get:
      tags:
        - Discover
      summary: Get a single discover record
      description: |
        Returns one discover record by id with its full answer graph
        (`edges` / `path_keys`) and its follow-up questions. Auth-gated but not
        owner-scoped: any signed-in caller can fetch any record by id. Unknown
        ids return 404.
      operationId: getDiscover
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: discover_id
          required: true
          schema:
            type: string
            format: uuid
