        '500':
          $ref: '#/components/responses/Internal'
  /collections:
    get:
      tags:
        - Collections
      summary: Get all collections
      description: |
        Returns a page of the collections the authenticated user can see —
        ones they own or ones shared with them via a collection join —
        newest-activity first. Each item carries its node count, the teams it's
        shared through (an array; a collection can be shared through several),
        and the authenticated user's own questions on it. `with_favourites=false` excludes
        the authenticated user's favourited collections; `query` is a case-insensitive title
        substring search.
      operationId: listCollections
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Case-insensitive collection-title substring filter.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (per_page).
        - in: query
          name: with_favourites
          required: false
          schema:
            type: boolean
            default: true
          description: When false, excludes the authenticated user's favourited collections.
      responses:
        '200':
          description: A page of the authenticated user's collections.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollectionsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Collections
      summary: Create a collection
      description: |
        Creates a collection owned by the authenticated user. The owner is
        taken from the verified session (urn:orbiter:user_id claim), not the
        body. When `team_id` is given, every other member of that team is added
        to the collection (the creator is the owner, not a member row), and each
        newly-added member receives a notification. Returns the created
        collection.
      operationId: createCollection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectionRequest'
      responses:
        '201':
          description: Created collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /collections/{collection_id}:
    get:
      tags:
        - Collections
      summary: Get one collection
      description: |
        Returns a single collection the authenticated user can see (owns or is shared with),
        enriched with its node count, the teams it's shared through, and the
        authenticated user's own questions on it. An unknown or inaccessible collection
        returns 404 (existence isn't leaked).
      operationId: getCollection
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionListItemEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Collections
      summary: Update a collection
      description: |
        Full replace of a collection's editable fields. Only the collection's
        owner may update it — a member who was shared the collection gets 403,
        and an unknown or inaccessible collection returns 404 (existence isn't
        leaked).
      operationId: updateCollection
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionRequest'
      responses:
        '200':
          description: The updated collection.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Collections
      summary: Delete a collection
      description: |
        Deletes a collection and all of its contents (members, nodes,
        questions, comments, reactions, favourites cascade; node ratings and
        assignments are cleared too). Only the owner may delete — a member gets
        403, and an unknown or inaccessible collection returns 404.
      operationId: deleteCollection
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_id
          required: true
          schema:
            type: string
            format: uuid
