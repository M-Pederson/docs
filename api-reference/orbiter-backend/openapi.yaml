        primary_location:
          $ref: '#/components/schemas/NodeLocation'
    CollectionNode:
      type: object
      required:
        - id
        - collection_id
        - label
        - rating
        - assigned_to_me
        - created_at
        - updated_at
      description: |
        One node pinned to a collection. Exactly one entity is populated:
        master_person / master_company carry a nested object; the graph-only
        entities surface as bare ids (no backing table to enrich them).
      properties:
        id:
          type: string
          format: uuid
        collection_id:
          type: string
          format: uuid
        label:
          type: string
        rating:
          type: number
          format: double
        added_by_user:
          $ref: '#/components/schemas/NodeUser'
        assigned_to_me:
          type: boolean
          description: Whether this node is assigned to the caller.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        master_person:
          $ref: '#/components/schemas/NodePerson'
        master_company:
          $ref: '#/components/schemas/NodeCompany'
        funding_round_id:
          type:
            - integer
            - 'null'
          format: int32
        film_tv_id:
          type:
            - integer
            - 'null'
          format: int32
        film_tv_award_id:
          type:
            - integer
            - 'null'
          format: int32
        live_event_id:
          type:
            - integer
            - 'null'
          format: int32
    ListCollectionNodesResponse:
      type: object
      required:
        - items
        - total
        - page
        - per_page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CollectionNode'
        total:
          type: integer
          format: int64
        page:
          type: integer
          format: int32
        per_page:
          type: integer
          format: int32
    ListCollectionNodesResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/ListCollectionNodesResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    AddCollectionNodesRequest:
      type: object
      required:
        - collection_id
      description: |
        Bulk-pin entities to a collection. Every list is optional; an empty
        request is a no-op. master_* are UUIDs; the rest are bare graph ids.
      properties:
        collection_id:
          type: string
          format: uuid
        master_person_ids:
          type: array
          items:
            type: string
            format: uuid
        master_company_ids:
          type: array
          items:
            type: string
            format: uuid
        company_funding_round_ids:
          type: array
          items:
            type: integer
            format: int32
        film_tv_ids:
          type: array
          items:
            type: integer
            format: int32
        film_tv_award_ids:
          type: array
          items:
            type: integer
            format: int32
        live_event_ids:
          type: array
          items:
            type: integer
            format: int32
    AddCollectionNodesResponse:
      type: object
      required:
        - added
      properties:
        added:
          type: integer
          description: Number of nodes newly added (already-pinned entities are skipped).
    AddCollectionNodesResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/AddCollectionNodesResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    MoveCollectionNodesRequest:
      type: object
      required:
        - collection_node_ids
        - collection_id
      description: |
        Move the listed nodes into collection_id. A node already present in the
        target (same entity) is merged: its source row is removed rather than
        duplicated.
      properties:
        collection_node_ids:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        collection_id:
          type: string
          format: uuid
          description: Target collection.
    MoveCollectionNodesResponse:
      type: object
      required:
        - moved
        - merged
      properties:
        moved:
          type: integer
          description: Nodes re-pointed to the target collection.
        merged:
          type: integer
          description: Nodes already present in the target; the source row was removed.
    MoveCollectionNodesResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/MoveCollectionNodesResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    AssignCollectionNodeRequest:
      type: object
      required:
        - user_id
        - label
      description: Assign a node to a user, in a labelled context.
      properties:
        user_id:
          type: string
          format: uuid
          description: The user the node is assigned to.
        label:
          type: string
          description: Assignment context. The value space may grow over time.
          enum:
            - collection
            - team
            - person
            - company
    CollectionNodeAssignment:
      type: object
      required:
        - id
        - node_id
        - assigned_to_user_id
        - label
        - created_at
      properties:
        id:
          type: string
          format: uuid
        node_id:
          type: string
          format: uuid
        assigned_to_user_id:
          type: string
          format: uuid
        assigned_by_user_id:
          type:
