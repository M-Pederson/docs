openapi: 3.1.0
info:
  title: Orbiter API
  version: 0.1.0
  description: |
    HTTP API for Orbiter. All endpoints are versioned under /v1/.

    This file is the root of the spec — paths are composed from
    per-feature fragments (`<feature>.openapi.yaml`) via $ref so each
    feature's contract lives next to its name. Shared schemas
    (Error, responses, security) stay here so every feature picks
    them up without duplication.

    To bundle into a single deployable file (e.g. for Swagger UI,
    Postman import, or openapi-generator):

        npx @redocly/cli bundle api/openapi.yaml -o api/dist/openapi.yaml
servers:
  - url: http://localhost:8080/v1
    description: Local
  - url: https://orbiter-backend-git-20506320032.us-central1.run.app/v1
    description: Staging (Cloud Run)
tags:
  - name: Auth
    description: Sign-up, sign-in, refresh, email verification, OAuth.
  - name: Users
    description: User CRUD. Requires a verified WorkOS access token.
  - name: Admin
    description: Operator-only utilities. Add an auth guard before production use.
  - name: Files
    description: |
      File-ingestion pipeline. Register a GCS object and the worker
      extracts → classifies → optionally builds a pitch profile.
  - name: Webhooks
    description: |
      Outbound webhook subscriptions, delivery inspection, and
      manual retry of dead deliveries.
  - name: Notes
    description: Notes CRUD. Requires a verified WorkOS access token.
  - name: Travels
    description: Travels CRUD. Requires a verified WorkOS access token.
  - name: Teams
    description: Teams listing. Requires a verified WorkOS access token.
  - name: Collections
    description: Collections CRUD. Requires a verified WorkOS access token.
paths:
  /sign-up:
    post:
      tags:
        - Auth
      summary: Create a new user
      description: |
        Creates a WorkOS identity, mints the local users.users row, and
        fans out provisioning side-effects (Knock identify, personal org,
        graph node) via Pub/Sub. Returns the user; the client should
        immediately call /sign-in to get tokens.
      operationId: signUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in:
    post:
      tags:
        - Auth
      summary: Sign in with email + password
      description: |
        Authenticates against WorkOS. Returns an access/refresh token pair
        on success. If the user's email isn't verified, returns 403 with a
        pending_authentication_token the frontend uses to drive the
        verify-email flow.
      operationId: signIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: Email verification required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationRequiredResponseEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in/refresh:
    post:
      tags:
        - Auth
      summary: Exchange a refresh token for a new access/refresh pair
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Refresh token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-out:
    post:
      tags:
        - Auth
      summary: Revoke the caller's WorkOS session
      description: |
        Revokes the WorkOS session identified by the access token's `sid`
        claim, so its refresh token can no longer mint new access tokens.
        Best-effort and idempotent; the frontend discards its stored tokens
        and redirects to login on the 204.
      operationId: signOut
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session revoked (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /verify-email:
    post:
      tags:
        - Auth
      summary: Complete email verification and sign in
      description: |
        Submits the code from the verification email together with the
        pending_authentication_token returned by /sign-in. On success
        returns the same AuthTokens shape as /sign-in.
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Verified and authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired verification code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /send-verification-email:
    post:
      tags:
        - Auth
      summary: (Re)send the verification email
      operationId: sendVerificationEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '200':
          description: Email dispatched (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /oauth/{provider}/start:
    get:
      tags:
        - Auth
      summary: Begin an OAuth sign-in flow
      description: |
        Returns the WorkOS authorization URL the browser should navigate to.
        WorkOS redirects back to the frontend /auth/callback route with
        state + code, which the frontend forwards to /oauth/callback.
      operationId: oauthStart
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum:
              - google
              - github
          description: OAuth provider (must be present in OAUTH_ALLOWED_PROVIDERS).
      responses:
        '200':
          description: Authorization URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /oauth/callback:
    get:
      tags:
        - Auth
      summary: Complete an OAuth sign-in flow
      description: |
        The frontend /auth/callback page forwards the WorkOS `code` and
        `state` here. We verify state, exchange the code for a session, and
        return the standard AuthTokens envelope.
      operationId: oauthCallback
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: State mismatch or code exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /users:
    get:
      tags:
        - Users
      summary: List users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: One page of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserID'
    get:
      tags:
        - Users
      summary: Get a user by id
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Users
      summary: Delete a user
      description: |
        Cascades to user_settings, user_roles, user_consumption_level, and
        organization_memberships.
      operationId: deleteUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Deleted (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /users/{id}/jwts/regenerate:
    get:
      tags:
        - Admin
      summary: Regenerate the user's Tiptap / Knock JWTs
      description: |
        Dev/admin utility — currently mounted on the public group. Add an
        auth guard before production use.
      operationId: regenerateJWTs
      security: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: New JWTs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /admin/provisioning-events/{id}/retry:
    post:
      tags:
        - Admin
      summary: Manually re-fire a failed provisioning attempt
      description: |
        Resets the row's status and republishes the message on the
        user-provisioning-events topic. Already-succeeded rows return 400.
      operationId: retryProvisioningEvent
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Republished attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningEventResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /admin/users/external-id:
    post:
      tags:
        - Admin
      summary: Stamp a user's local id onto their WorkOS external_id
      description: |
        Sets external_id on the WorkOS user so access tokens carry the
        urn:orbiter:user_id claim. Backfill / repair tool.
      operationId: setUserExternalID
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetExternalIDRequest'
      responses:
        '200':
          description: external_id updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /notes:
    get:
      tags:
        - Notes
      summary: List the caller's notes
      description: |
        Returns the authenticated user's notes, optionally filtered to
        those mentioning a person and/or company (AND when both are set;
        omit both for all notes). Ordered by updated_at then created_at,
        descending.
      operationId: listNotes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: my_person_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: my_company_id
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Matching notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNotesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Notes
      summary: Create a note
      description: |
        Creates a note owned by the authenticated caller. The owner is
        taken from the verified session (urn:orbiter:user_id claim), not
        the body.
      operationId: createNote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Created note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /notes/{note_id}:
    get:
      tags:
        - Notes
      summary: Get a note by id
      operationId: getNote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    patch:
      tags:
        - Notes
      summary: Update a note
      operationId: updateNote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Notes
      summary: Delete a note
      operationId: deleteNote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /notes/{note_id}/collaborators:
    get:
      tags:
        - Notes
      summary: List a note's collaborators
      operationId: listNoteCollaborators
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collaborators.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollaboratorsResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Notes
      summary: Add a collaborator to a note
      operationId: addNoteCollaborator
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollaboratorRequest'
      responses:
        '201':
          description: Added collaborator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /notes/{note_id}/collaborators/{user_id}:
    patch:
      tags:
        - Notes
      summary: Update a collaborator's access mode
      operationId: updateNoteCollaboratorMode
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollaboratorModeRequest'
      responses:
        '200':
          description: Updated collaborator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Notes
      summary: Remove a collaborator from a note
      operationId: removeNoteCollaborator
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Removed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /travels:
    get:
      tags:
        - Travels
      summary: List the caller's travels
      description: |
        Returns all travels visible to the authenticated user — owned, or
        directly shared to them (travel_user_join.shared_to_user) — split into
        active_travels (end date today or later, or unset) and archived_travels
        (end date before today). Not paginated.
      operationId: listTravels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's travels, grouped into active and archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTravelsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Travels
      summary: Create a travel
      description: |
        Creates a travel owned by the authenticated caller. The owner is
        taken from the verified session (urn:orbiter:user_id claim), not
        the body.
      operationId: createTravel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTravelRequest'
      responses:
        '201':
          description: Created travel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /travels/{travel_id}:
    get:
      tags:
        - Travels
      summary: Get a travel by id
      operationId: getTravel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: travel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The travel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Travels
      summary: Update a travel
      description: |
        Full replace of the user-editable fields, scoped to the owner. Omitted
        fields are reset, and an omitted/empty contact_ids or team_ids clears
        that relation — clients must send the full intended state.
      operationId: updateTravel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: travel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTravelRequest'
      responses:
        '200':
          description: Updated travel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Travels
      summary: Delete a travel
      operationId: deleteTravel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: travel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /teams:
    get:
      tags:
        - Teams
      summary: List the caller's teams
      description: |
        Returns a page of the teams the authenticated caller is an accepted
        member of, newest first. Each item carries the team's total member
        count and the caller's own membership. `with_favourites=false` excludes
        teams the caller has favourited; `query` is a case-insensitive title
        substring search.
      operationId: listTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Case-insensitive team-title substring filter.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (per_page).
        - in: query
          name: with_favourites
          required: false
          schema:
            type: boolean
            default: true
          description: When false, excludes the caller's favourited teams.
      responses:
        '200':
          description: A page of the caller's teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTeamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Teams
      summary: Create a team with members
      description: |
        Creates a team owned by the authenticated caller. The owner is taken
        from the verified session (urn:orbiter:user_id claim), not the body.
        The creator is added as an accepted admin; each id in `user_ids` is
        added as a pending invite (deduped). Returns the created team.
      operationId: createTeam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Created team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /teams/{team_id}:
    get:
      tags:
        - Teams
      summary: Get a team by id
      description: |
        Returns a single team. The caller must be a member of the team (any
        status); a non-member or an unknown team returns 404 so a team's
        existence isn't leaked to outsiders.
      operationId: getTeam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Teams
      summary: Update a team
      description: |
        Full replace of a team's editable fields. The caller must be an accepted
        admin member of the team (the creator, or a promoted admin); an unknown
        team or a non-admin caller returns 404.
      operationId: updateTeam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Teams
      summary: Delete a team
      description: |
        Deletes a team and (via ON DELETE CASCADE) its members, questions, and
        question nodes. The caller must be an accepted admin member; an unknown
        team or a non-admin caller returns 404.
      operationId: deleteTeam
      security:
        - bearerAuth: []
