  /activities:
    get:
      tags:
        - Activities
      summary: Get the caller's contact activity feed
      description: |
        Returns the authenticated user's contact activity feed, grouped by day
        (newest-first), one card per contact at their last-touch day. Walks back
        up to 7 non-empty days from the time_range anchor. Empty days are
        included only when the user's show_empty_orbits setting is on.
      operationId: getActivityFeed
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: time_range
          required: false
          description: Upper bound of the walk. "now" (default), an RFC3339 timestamp, or a YYYY-MM-DD date.
          schema:
            type: string
            default: now
      responses:
        '200':
          description: The day-grouped activity feed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityFeedEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /teams:
    get:
      tags:
        - Teams
      summary: List the caller's teams
      description: |
        Returns a page of the teams the authenticated caller is an accepted
        member of, newest first. Each item carries the team's total member
        count and the caller's own membership. `with_favourites=false` excludes
        teams the caller has favourited; `query` is a case-insensitive title
        substring search.
      operationId: listTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Case-insensitive team-title substring filter.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (per_page).
        - in: query
          name: with_favourites
          required: false
          schema:
            type: boolean
            default: true
          description: When false, excludes the caller's favourited teams.
      responses:
        '200':
          description: A page of the caller's teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTeamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Teams
      summary: Create a team with members
      description: |
        Creates a team owned by the authenticated caller. The owner is taken
        from the verified session (urn:orbiter:user_id claim), not the body.
        The creator is added as an accepted admin; each id in `user_ids` is
        added as a pending invite (deduped). Returns the created team.
      operationId: createTeam
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamRequest'
      responses:
        '201':
          description: Created team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /teams/{team_id}:
    get:
      tags:
        - Teams
      summary: Get a team by id
      description: |
        Returns a single team. The caller must be a member of the team (any
        status); a non-member or an unknown team returns 404 so a team's
        existence isn't leaked to outsiders.
      operationId: getTeam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Teams
      summary: Update a team
      description: |
        Full replace of a team's editable fields. The caller must be an accepted
        admin member of the team (the creator, or a promoted admin); an unknown
        team or a non-admin caller returns 404.
      operationId: updateTeam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeamRequest'
      responses:
        '200':
          description: Updated team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Teams
      summary: Delete a team
      description: |
        Deletes a team and (via ON DELETE CASCADE) its members, questions, and
        question nodes. The caller must be an accepted admin member; an unknown
        team or a non-admin caller returns 404.
      operationId: deleteTeam
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /teams/{team_id}/members:
    get:
      tags:
        - Teams
      summary: List a team's members
      description: |
        Paginated list of a team's members, newest first. The caller must be a
        member of the team; non-members get 404. (master_person profile
        enrichment is not included yet.)
      operationId: listTeamMembers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: team_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: A page of the team's members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTeamMembersResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
