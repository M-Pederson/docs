        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files/upload-file-markdown:
    post:
      tags:
        - Files
      summary: Upload a file (markdown)
      description: |
        Streams the uploaded file to GCS, records the file row, persists the
        user-supplied `markdown`, and publishes `files.uploaded`. Because the
        markdown is already provided, the worker SKIPS its extraction step.
        Returns the file with `status=pending`. Max body size 100 MB. Requires
        a verified WorkOS session.

        Use this when the frontend has already run extraction (e.g. LlamaParse
        on a server function) and just needs the file persisted + ingested.

        IMPORTANT — part ordering: the `file` part is streamed straight to GCS
        and must be sent **last**, after all text fields, so the server can
        process it in a single pass without buffering it in memory.
      operationId: uploadFileMarkdown
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileMarkdownRequest'
      responses:
        '201':
          description: File uploaded, row created, and queued for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadFileResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files/upload-file-raw:
    post:
      tags:
        - Files
      summary: Upload a file (raw)
      description: |
        Synchronous extract-then-upload path. The server extracts the file's
        markdown inline (local extractor or LlamaParse by mime type), uploads
        the file to GCS, persists the row WITH the extracted markdown, and
        returns the file object — `markdown` included — with `status=pending`.
        It then publishes `files.uploaded` so the worker runs the rest of the
        pipeline (classification, embeddings) and SKIPS re-extraction.

        Because extraction runs on the request path, the call BLOCKS until
        extraction completes (seconds to minutes for large documents) — set
        client/proxy timeouts accordingly. If extraction fails, nothing is
        persisted and the request errors. Any `markdown` form field is ignored.
        Max body size 100 MB. Requires a verified WorkOS session.

        IMPORTANT — part ordering: send the `file` part **last**, after all
        text fields, so they are known when the file part is reached.
      operationId: uploadFileRaw
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadFileRawRequest'
      responses:
        '201':
          description: File uploaded, row created, and queued for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadFileResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files/{id}:
    get:
      tags:
        - Files
      summary: Get one file
      description: Get a file by id
      operationId: getFile
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files/{id}/retry:
    post:
      tags:
        - Files
      summary: Retry a failed file
      description: |
        Resets status to `pending` and republishes the `files.uploaded`
        event so the worker pipeline runs again. Use this to recover
        files dead-lettered by Pub/Sub after repeated transient errors.

        Only allowed from `failed` or `pending` status — in-flight
        statuses (`extracting`, `embedding`, `classified`) return 409
        to prevent double-processing.
      operationId: retryFile
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Retry accepted; file re-queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: File is in an in-flight status that cannot be retried.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
