      description: Get a company's full detail record
      security:
        - bearerAuth: []
      parameters:
        - name: company_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Company detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CompanyDetail'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /company-contacts:
    get:
      operationId: listCompanyContacts
      tags:
        - Company Contacts
      summary: Get all company contacts
      description: List the authenticated user's saved companies (company contacts)
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema:
            type: string
        - name: query
          in: query
          description: Case-insensitive company-name filter.
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order. `created_at` is newest-first; `name` is company name A-Z.
          schema:
            type: string
            enum:
              - created_at
              - name
            default: created_at
        - name: created_after
          in: query
          description: Only company contacts created at or after this RFC3339 timestamp (inclusive).
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: Only company contacts created at or before this RFC3339 timestamp (inclusive).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated company-contact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CompanyContactListItem'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                      total:
                        type: integer
                      next_cursor:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /company-contacts/clone:
    post:
      operationId: cloneCompanyContacts
      tags:
        - Company Contacts
      summary: Clone company contacts from a donor
      description: |
        Duplicates the company-contact rows of a randomly chosen donor (the user holding the most company contacts, ties broken randomly) into the authenticated user's account. Only the company_contacts rows are cloned; existing contacts are left untouched and donor data is not deleted. Idempotent — companies the authenticated user already holds are skipped.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Company contacts cloned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CloneCompanyContactsResult'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /merge-suspects:
    get:
      operationId: listMergeSuspects
      tags:
