        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeamQuestionRequest'
      responses:
        '201':
          description: The created team question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamQuestionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /team-questions/{team_question_id}:
    put:
      tags:
        - Teams
      summary: Edit a team question
      description: |
        Edits only the question text of a team question. Only the asker may edit
        their own question (others get 403); an unknown question returns 404.
      operationId: updateTeamQuestion
      security:
        - bearerAuth: []
      parameters:
