name: Sync Orbiter Backend Nav

on:
  # Fires when the orbiter-bot spec sync (or anyone) updates the OpenAPI spec
  push:
    branches: [main]
    paths:
      - api-reference/orbiter-backend/openapi.yaml
      - scripts/sync-orbiter-backend-nav.mjs

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Sync Orbiter Backend navigation
        run: node scripts/sync-orbiter-backend-nav.mjs

      - name: Commit and push changes
        run: |
          git diff --quiet docs.json && echo "Navigation already in sync" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs.json
          git commit -m "chore: sync Orbiter Backend nav with OpenAPI spec

          Regenerated the Orbiter Backend navigation in docs.json from
          api-reference/orbiter-backend/openapi.yaml.
          Triggered by: ${{ github.event_name }}"
          git pull --rebase origin main
          git push
