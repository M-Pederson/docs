        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-questions/{collection_question_id}:
    put:
      tags:
        - Collections
      summary: Edit a question
      description: |
        Edits a question's text. Only the asker may edit it; an unknown question
