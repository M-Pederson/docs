      description: master_person enrichment of a person node.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        avatar:
          type:
            - string
            - 'null'
        current_title:
          type:
            - string
            - 'null'
        bio:
          type:
            - string
            - 'null'
        master_company:
