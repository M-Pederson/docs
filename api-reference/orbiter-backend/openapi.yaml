      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: Subscription created; secret returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSubscriptionWithSecretResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
    get:
      tags:
        - Webhooks
      summary: List subscriptions
      operationId: listWebhookSubscriptions
      security: []
      responses:
        '200':
          description: Subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubscriptionsResponseEnvelope'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/subscriptions/{id}:
    parameters:
      - $ref: '#/components/parameters/SubscriptionID'
    get:
      tags:
        - Webhooks
      summary: Get a subscription
      operationId: getWebhookSubscription
      security: []
      responses:
        '200':
          description: Subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponseEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    patch:
      tags:
        - Webhooks
      summary: Update a subscription's URL or enabled flag
      operationId: updateWebhookSubscription
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
      responses:
        '200':
          description: Updated subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Webhooks
      summary: Delete a subscription
      operationId: deleteWebhookSubscription
      security: []
      responses:
        '200':
          description: Deleted (no body).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/deliveries:
    get:
      tags:
        - Webhooks
      summary: List dead-lettered deliveries
      description: |
        Today only `status=dead` is supported — surfacing the dead pile
        is the only listing affordance v2.0 promises. Other filters
        will follow once the operator UI grows.
      operationId: listWebhookDeliveries
      security: []
      parameters:
        - in: query
          name: status
          required: true
          schema:
            type: string
            enum:
              - dead
          description: Only `dead` is accepted today.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: One page of dead deliveries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDeliveriesResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/deliveries/{id}/retry:
    post:
      tags:
        - Webhooks
      summary: Manually re-fire a dead delivery
      description: |
        Resets the delivery's status and republishes onto the
        deliveries topic. The actual retry is asynchronous, hence
        the 202 response.
      operationId: retryWebhookDelivery
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Retry accepted; delivery requeued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: WorkOS access token returned by /sign-in or /verify-email.
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
    ErrorDetail:
      type: object
      required:
        - field
        - issue
      properties:
        field:
          type: string
        issue:
          type: string
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine code — NOT_FOUND / VALIDATION_FAILED / CONFLICT / UNAUTHORIZED / FORBIDDEN / INTERNAL.
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        debug:
          type:
            - string
            - 'null'
          description: Wrapped technical cause; present only in debug mode.
    ErrorEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      description: Error response — data is always null.
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/Meta'
    EmptyEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      description: Success with no payload (e.g. deletes) — data and error are null.
      properties:
        data:
          type: 'null'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
