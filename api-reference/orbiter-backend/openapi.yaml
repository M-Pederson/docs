          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    DeliveryResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/DeliveryResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
  responses:
    BadRequest:
      description: Validation or malformed request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Forbidden:
      description: Authenticated but not permitted to perform this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Conflict:
      description: Resource already exists.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    Internal:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
  parameters:
    UserID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: User id (UUIDv7).
    SubscriptionID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
      description: Subscription id.
