      summary: Get teams shared with a user
      description: |
        Returns the teams the authenticated user and the queried `user_id` are
        BOTH accepted members of (the intersection), newest first. Each item
        carries the team's member count and the authenticated user's own membership. Empty
        when they share no teams.
      operationId: listSharedTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
