        - meta
      properties:
        data:
          $ref: '#/components/schemas/EventTypesResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    SubscriptionResponse:
      type: object
      required:
        - id
        - environment
        - event_type
        - url
        - enabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type:
            - string
            - 'null'
          format: uuid
        organization_id:
          type:
            - string
            - 'null'
          format: uuid
        environment:
          type: string
        event_type:
          type: string
        url:
          type: string
          format: uri
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListSubscriptionsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionResponse'
    ListSubscriptionsResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/ListSubscriptionsResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    CreateSubscriptionRequest:
      type: object
      required:
        - environment
        - event_type
        - url
      properties:
        environment:
          type: string
          maxLength: 64
          description: Logical environment (e.g. live, staging, sandbox).
        event_type:
          type: string
          maxLength: 128
          description: One of the values returned by GET /webhooks/event-types.
        url:
          type: string
          format: uri
          description: Destination HTTPS endpoint that will receive deliveries.
        enabled:
          type:
            - boolean
            - 'null'
          description: Defaults to true when omitted.
    CreateSubscriptionWithSecretResponse:
      allOf:
        - $ref: '#/components/schemas/SubscriptionResponse'
        - type: object
          required:
            - secret
          properties:
            secret:
              type: string
              description: |
                HMAC signing secret. Returned **only on create** — store
                this immediately; later GETs will not include it. Used
                to verify the X-Webhook-Signature header on deliveries.
    CreateSubscriptionWithSecretResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/CreateSubscriptionWithSecretResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    SubscriptionResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/SubscriptionResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    UpdateSubscriptionRequest:
      type: object
      required:
        - url
        - enabled
      properties:
        url:
          type: string
          format: uri
        enabled:
          type: boolean
    DeliveryResponse:
      type: object
      required:
        - id
        - subscription_id
        - event_id
        - status
        - attempts
        - max_attempts
        - created_at
      properties:
        id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        event_id:
          type: string
        status:
          type: string
          description: |
            Delivery state. Common values: pending, in_progress, succeeded,
            failed, dead.
        attempts:
          type: integer
          format: int32
        max_attempts:
          type: integer
          format: int32
        last_error:
          type: string
        last_attempt_at:
          type: string
          format: date-time
        next_retry_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    ListDeliveriesResponse:
      type: object
