        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /collection-nodes/{collection_node_id}/ratings:
    post:
      tags:
        - Collections
      summary: Rate a node
      description: |
        Records a 1-5 rating for the node on behalf of user_id (the session
        authenticated user is the authoriser), then recomputes the node's aggregate score
        (collection_node.rating = mean rounded to 1dp) and returns the new
