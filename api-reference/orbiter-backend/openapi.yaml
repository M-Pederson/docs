  /collection-reactions/{collection_reaction_id}:
    delete:
      tags:
        - Collections
      summary: Remove a reaction
      description: |
        Deletes one of the caller's reactions by id. Only the owner may delete
        it; an unknown reaction or one the caller didn't make returns 404.
      operationId: deleteCommentReaction
