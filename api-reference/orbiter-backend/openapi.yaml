openapi: 3.1.0
info:
  title: Orbiter API
  version: 0.1.0
  description: |
    HTTP API for Orbiter. All endpoints are versioned under /v1/.

    This file is the root of the spec — paths are composed from
    per-feature fragments (`<feature>.openapi.yaml`) via $ref so each
    feature's contract lives next to its name. Shared schemas
    (Error, responses, security) stay here so every feature picks
    them up without duplication.

    To bundle into a single deployable file (e.g. for Swagger UI,
    Postman import, or openapi-generator):

        npx @redocly/cli bundle api/openapi.yaml -o api/dist/openapi.yaml
servers:
  - url: http://localhost:8080/v1
    description: Local
  - url: https://orbiter-backend-git-20506320032.us-central1.run.app/v1
    description: Staging (Cloud Run)
tags:
  - name: Auth
    description: Sign-up, sign-in, refresh, email verification, OAuth.
  - name: Users
    description: User CRUD. Requires a verified WorkOS access token.
  - name: Admin
    description: Operator-only utilities. Add an auth guard before production use.
  - name: Files
    description: |
      File-ingestion pipeline. Register a GCS object and the worker
      extracts → classifies → optionally builds a pitch profile.
  - name: Webhooks
    description: |
      Outbound webhook subscriptions, delivery inspection, and
      manual retry of dead deliveries.
  - name: Notes
    description: Notes CRUD. Requires a verified WorkOS access token.
  - name: Travels
    description: Travels CRUD. Requires a verified WorkOS access token.
paths:
  /sign-up:
    post:
      tags:
        - Auth
      summary: Create a new user
      description: |
        Creates a WorkOS identity, mints the local users.users row, and
        fans out provisioning side-effects (Knock identify, personal org,
        graph node) via Pub/Sub. Returns the user; the client should
        immediately call /sign-in to get tokens.
      operationId: signUp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignUpRequest'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in:
    post:
      tags:
        - Auth
      summary: Sign in with email + password
      description: |
        Authenticates against WorkOS. Returns an access/refresh token pair
        on success. If the user's email isn't verified, returns 403 with a
        pending_authentication_token the frontend uses to drive the
        verify-email flow.
      operationId: signIn
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignInRequest'
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Email verification required.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailVerificationRequiredResponse'
        '500':
          $ref: '#/components/responses/Internal'
  /sign-in/refresh:
    post:
      tags:
        - Auth
      summary: Exchange a refresh token for a new access/refresh pair
      operationId: refreshSession
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Refresh token invalid or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/Internal'
  /verify-email:
    post:
      tags:
        - Auth
      summary: Complete email verification and sign in
      description: |
        Submits the code from the verification email together with the
        pending_authentication_token returned by /sign-in. On success
        returns the same AuthTokens shape as /sign-in.
      operationId: verifyEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Verified and authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid or expired verification code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/Internal'
  /send-verification-email:
    post:
      tags:
        - Auth
      summary: (Re)send the verification email
      operationId: sendVerificationEmail
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendVerificationEmailRequest'
      responses:
        '204':
          description: Email dispatched (no body).
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /oauth/{provider}/start:
    get:
      tags:
        - Auth
      summary: Begin an OAuth sign-in flow
      description: |
        Returns the WorkOS authorization URL the browser should navigate to.
        WorkOS round-trips state + code back to /oauth/callback.
      operationId: oauthStart
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema:
            type: string
            enum:
              - google
              - github
          description: OAuth provider (must be present in OAUTH_ALLOWED_PROVIDERS).
      responses:
        '200':
          description: Authorization URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthStartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /oauth/callback:
    get:
      tags:
        - Auth
      summary: Complete an OAuth sign-in flow
      description: |
        WorkOS redirects the user-agent here with `code` and `state`. We
        verify state, exchange the code for a session, and return the
        standard AuthTokens envelope.
      operationId: oauthCallback
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema:
            type: string
        - in: query
          name: state
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: State mismatch or code exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/Internal'
  /users:
    get:
      tags:
        - Users
      summary: List users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: One page of users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListUsersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/UserID'
    get:
      tags:
        - Users
      summary: Get a user by id
      operationId: getUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Users
      summary: Delete a user
      description: |
        Cascades to user_settings, user_roles, user_consumption_level, and
        organization_memberships.
      operationId: deleteUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted (no body).
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /users/{id}/jwts/regenerate:
    get:
      tags:
        - Admin
      summary: Regenerate the user's Tiptap / Knock JWTs
      description: |
        Dev/admin utility — currently mounted on the public group. Add an
        auth guard before production use.
      operationId: regenerateJWTs
      security: []
      parameters:
        - $ref: '#/components/parameters/UserID'
      responses:
        '200':
          description: New JWTs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /admin/provisioning-events/{id}/retry:
    post:
      tags:
        - Admin
      summary: Manually re-fire a failed provisioning attempt
      description: |
        Resets the row's status and republishes the message on the
        user-provisioning-events topic. Already-succeeded rows return 400.
      operationId: retryProvisioningEvent
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Republished attempt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProvisioningEventResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /admin/users/external-id:
    post:
      tags:
        - Admin
      summary: Stamp a user's local id onto their WorkOS external_id
      description: |
        Sets external_id on the WorkOS user so access tokens carry the
        urn:orbiter:user_id claim. Backfill / repair tool.
      operationId: setUserExternalID
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetExternalIDRequest'
      responses:
        '204':
          description: external_id updated.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /notes:
    get:
      tags:
        - Notes
      summary: List the caller's notes
      description: |
        Returns the authenticated user's notes, optionally filtered to
        those mentioning a person and/or company (AND when both are set;
        omit both for all notes). Ordered by updated_at then created_at,
        descending.
      operationId: listNotes
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: my_person_id
          required: false
          schema:
            type: string
            format: uuid
        - in: query
          name: my_company_id
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Matching notes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNotesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Notes
      summary: Create a note
      description: |
        Creates a note owned by the authenticated caller. The owner is
        taken from the verified session (urn:orbiter:user_id claim), not
        the body.
      operationId: createNote
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Created note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /notes/{note_id}:
    get:
      tags:
        - Notes
      summary: Get a note by id
      operationId: getNote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    patch:
      tags:
        - Notes
      summary: Update a note
      operationId: updateNote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Updated note.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Notes
      summary: Delete a note
      operationId: deleteNote
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /notes/{note_id}/collaborators:
    get:
      tags:
        - Notes
      summary: List a note's collaborators
      operationId: listNoteCollaborators
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Collaborators.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListCollaboratorsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Notes
      summary: Add a collaborator to a note
      operationId: addNoteCollaborator
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCollaboratorRequest'
      responses:
        '201':
          description: Added collaborator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/Internal'
  /notes/{note_id}/collaborators/{user_id}:
    patch:
      tags:
        - Notes
      summary: Update a collaborator's access mode
      operationId: updateNoteCollaboratorMode
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollaboratorModeRequest'
      responses:
        '200':
          description: Updated collaborator.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollaboratorResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Notes
      summary: Remove a collaborator from a note
      operationId: removeNoteCollaborator
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: note_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removed.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /travels:
    get:
      tags:
        - Travels
      summary: List the caller's travels
      description: |
        Returns all travels visible to the authenticated user — owned, or
        directly shared to them (travel_user_join.shared_to_user) — split into
        active_travels (end date today or later, or unset) and archived_travels
        (end date before today). Not paginated.
      operationId: listTravels
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The caller's travels, grouped into active and archived.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTravelsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    post:
      tags:
        - Travels
      summary: Create a travel
      description: |
        Creates a travel owned by the authenticated caller. The owner is
        taken from the verified session (urn:orbiter:user_id claim), not
        the body.
      operationId: createTravel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTravelRequest'
      responses:
        '201':
          description: Created travel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /travels/{travel_id}:
    get:
      tags:
        - Travels
      summary: Get a travel by id
      operationId: getTravel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: travel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: The travel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Travels
      summary: Update a travel
      description: |
        Full replace of the user-editable fields, scoped to the owner. Omitted
        fields are reset, and an omitted/empty contact_ids or team_ids clears
        that relation — clients must send the full intended state.
      operationId: updateTravel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: travel_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTravelRequest'
      responses:
        '200':
          description: Updated travel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Travels
      summary: Delete a travel
      operationId: deleteTravel
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: travel_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files:
    post:
      tags:
        - Files
      summary: Register a newly-uploaded GCS object for processing
      description: |
        Records the file row and publishes `files.uploaded` to Pub/Sub.
        The worker takes over from there (extract → classify → optional
        pitch-profile). Returns immediately with the file's id and
        `status=pending`.
      operationId: createFile
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '201':
          description: File row created and queued for processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
    get:
      tags:
        - Files
      summary: List files (cursor-paginated)
      operationId: listFiles
      security: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: cursor
          schema:
            type: string
          description: Opaque pagination cursor returned by a prior listing.
      responses:
        '200':
          description: One page of files.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFilesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files/{id}:
    get:
      tags:
        - Files
      summary: Get a file by id
      operationId: getFile
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: File.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /ingestion/files/{id}/retry:
    post:
      tags:
        - Files
      summary: Re-queue a previously-failed file for processing
      description: |
        Resets status to `pending` and republishes the `files.uploaded`
        event so the worker pipeline runs again. Use this to recover
        files dead-lettered by Pub/Sub after repeated transient errors.

        Only allowed from `failed` or `pending` status — in-flight
        statuses (`extracting`, `embedding`, `classified`) return 409
        to prevent double-processing.
      operationId: retryFile
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Retry accepted; file re-queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: File is in an in-flight status that cannot be retried.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/event-types:
    get:
      tags:
        - Webhooks
      summary: List the event types subscriptions may target
      description: |
        Returns the closed set of event types the platform currently
        publishes (e.g. `pitch_profile.completed`, `files.completed`).
        Use this to populate the event-type picker in your UI.
      operationId: listWebhookEventTypes
      security: []
      responses:
        '200':
          description: Event types.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventTypesResponse'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/subscriptions:
    post:
      tags:
        - Webhooks
      summary: Create a webhook subscription
      description: |
        Server generates the signing secret and returns it **exactly
        once** in this response — clients must persist it now or
        rotate. Subsequent GETs never re-disclose the secret.
      operationId: createWebhookSubscription
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionRequest'
      responses:
        '201':
          description: Subscription created; secret returned once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSubscriptionWithSecretResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
    get:
      tags:
        - Webhooks
      summary: List subscriptions
      operationId: listWebhookSubscriptions
      security: []
      responses:
        '200':
          description: Subscriptions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSubscriptionsResponse'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/subscriptions/{id}:
    parameters:
      - $ref: '#/components/parameters/SubscriptionID'
    get:
      tags:
        - Webhooks
      summary: Get a subscription
      operationId: getWebhookSubscription
      security: []
      responses:
        '200':
          description: Subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    patch:
      tags:
        - Webhooks
      summary: Update a subscription's URL or enabled flag
      operationId: updateWebhookSubscription
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionRequest'
      responses:
        '200':
          description: Updated subscription.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    delete:
      tags:
        - Webhooks
      summary: Delete a subscription
      operationId: deleteWebhookSubscription
      security: []
      responses:
        '204':
          description: Deleted (no body).
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/deliveries:
    get:
      tags:
        - Webhooks
      summary: List dead-lettered deliveries
      description: |
        Today only `status=dead` is supported — surfacing the dead pile
        is the only listing affordance v2.0 promises. Other filters
        will follow once the operator UI grows.
      operationId: listWebhookDeliveries
      security: []
      parameters:
        - in: query
          name: status
          required: true
          schema:
            type: string
            enum:
              - dead
          description: Only `dead` is accepted today.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: One page of dead deliveries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListDeliveriesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/Internal'
  /webhooks/deliveries/{id}/retry:
    post:
      tags:
        - Webhooks
      summary: Manually re-fire a dead delivery
      description: |
        Resets the delivery's status and republishes onto the
        deliveries topic. The actual retry is asynchronous, hence
        the 202 response.
      operationId: retryWebhookDelivery
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Retry accepted; delivery requeued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeliveryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: WorkOS access token returned by /sign-in or /verify-email.
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error kind from internal/platform/apperror (validation, not_found, conflict, unauthorized, forbidden, internal).
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    SignUpRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 128
        first_name:
          type:
            - string
            - 'null'
          maxLength: 128
        last_name:
          type:
            - string
            - 'null'
          maxLength: 128
        timezone:
          type:
            - string
            - 'null'
          maxLength: 64
          description: IANA timezone, e.g. "America/New_York".
    UserResponse:
      type: object
      required:
        - id
        - active_account
        - copilot_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        master_person_id:
          type:
            - string
            - 'null'
          format: uuid
        username:
          type:
            - string
            - 'null'
        workos_id:
          type:
            - string
            - 'null'
        graph_id:
          type:
            - string
            - 'null'
        primary_timezone:
          type:
            - string
            - 'null'
        active_account:
          type: boolean
        copilot_enabled:
          type: boolean
        last_activity:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SignInRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          maxLength: 128
        timezone:
          type:
            - string
            - 'null'
          maxLength: 64
    AuthTokensResponse:
      type: object
      required:
        - user
        - access_token
        - refresh_token
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        access_token:
          type: string
          description: 'Send as Authorization: Bearer on subsequent requests.'
        refresh_token:
          type: string
    EmailVerificationRequiredResponse:
      type: object
      required:
        - error
        - message
        - pending_authentication_token
      properties:
        error:
          type: string
          example: email_verification_required
        message:
          type: string
        pending_authentication_token:
          type: string
        email_verification_id:
          type: string
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
        timezone:
          type:
            - string
            - 'null'
          maxLength: 64
    VerifyEmailRequest:
      type: object
      required:
        - code
        - pending_authentication_token
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 12
        pending_authentication_token:
          type: string
    SendVerificationEmailRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email
          maxLength: 320
    OAuthStartResponse:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
    ListUsersResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
    JWTsResponse:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
        workos_id:
          type:
            - string
            - 'null'
        tiptap_collab_jwt:
          type:
            - string
            - 'null'
        tiptap_ai_jwt:
          type:
            - string
            - 'null'
        knock_jwt:
          type:
            - string
            - 'null'
    ProvisioningEventResponse:
      type: object
      required:
        - id
        - user_id
        - correlation_id
        - trigger
        - task
        - status
        - attempts
        - payload
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        correlation_id:
          type: string
          format: uuid
        trigger:
          type: string
          description: What caused the attempt (e.g. sign_up).
        task:
          type: string
          description: Provisioning task name (knock_identify, personal_org, user_graph).
        status:
          type: string
          enum:
            - pending
            - in_progress
            - succeeded
            - failed
            - dead_lettered
        attempts:
          type: integer
          format: int32
        last_error:
          type:
            - string
            - 'null'
        payload:
          type: string
          description: Raw JSON message body, as-stored.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SetExternalIDRequest:
      type: object
      required:
        - workos_user_id
        - user_id
      properties:
        workos_user_id:
          type: string
        user_id:
          type: string
          format: uuid
    NoteResponse:
      type: object
      required:
        - id
        - is_document
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type:
            - string
            - 'null'
          format: uuid
        title:
          type:
            - string
            - 'null'
        note:
          type:
            - string
            - 'null'
        is_document:
          type: boolean
        tiptap_reference:
          type:
            - string
            - 'null'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListNotesResponse:
      type: object
      required:
        - items
        - total
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NoteResponse'
        total:
          type: integer
          format: int64
    CreateNoteRequest:
      type: object
      description: |
        my_person_mentions / my_company_mentions are saved with mention=true;
        my_person_id / my_company_id (when set) with mention=false.
      properties:
        title:
          type:
            - string
            - 'null'
          maxLength: 512
        note:
          type:
            - string
            - 'null'
        is_document:
          type: boolean
        tiptap_reference:
          type:
            - string
            - 'null'
          maxLength: 512
        my_person_mentions:
          type: array
          items:
            type: string
            format: uuid
        my_company_mentions:
          type: array
          items:
            type: string
            format: uuid
        my_person_id:
          type:
            - string
            - 'null'
          format: uuid
        my_company_id:
          type:
            - string
            - 'null'
          format: uuid
    UpdateNoteRequest:
      type: object
      properties:
        title:
          type:
            - string
            - 'null'
          maxLength: 512
        note:
          type:
            - string
            - 'null'
        is_document:
          type: boolean
        tiptap_reference:
          type:
            - string
            - 'null'
          maxLength: 512
    CollaboratorResponse:
      type: object
      required:
        - id
        - note_id
        - user_id
        - mode
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        note_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        mode:
          type: string
          enum:
            - viewer
            - editor
            - commentor
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListCollaboratorsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CollaboratorResponse'
    AddCollaboratorRequest:
      type: object
      required:
        - user_id
        - mode
      properties:
        user_id:
          type: string
          format: uuid
        mode:
          type: string
          enum:
            - viewer
            - editor
            - commentor
    UpdateCollaboratorModeRequest:
      type: object
      required:
        - mode
      properties:
        mode:
          type: string
          enum:
            - viewer
            - editor
            - commentor
    TravelResponse:
      type: object
      required:
        - id
        - user_id
        - departing_from
        - destination
        - destination_longitude
        - destination_latitude
        - share_to_all
        - share_to_connections
        - private
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        departing_from:
          type: string
        destination:
          type: string
        start_date:
          type:
            - string
            - 'null'
          format: date-time
        end_date:
          type:
            - string
            - 'null'
          format: date-time
        destination_longitude:
          type: number
          format: double
        destination_latitude:
          type: number
          format: double
        note:
          type:
            - string
            - 'null'
        link:
          type:
            - string
            - 'null'
        link_company:
          type:
            - string
            - 'null'
        share_to_all:
          type: boolean
        share_to_connections:
          type: boolean
        private:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListTravelsResponse:
      type: object
      required:
        - active_travels
        - archived_travels
        - total
      properties:
        active_travels:
          type: array
          items:
            $ref: '#/components/schemas/TravelResponse'
        archived_travels:
          type: array
          items:
            $ref: '#/components/schemas/TravelResponse'
        total:
          type: integer
          format: int64
    CreateTravelRequest:
      type: object
      required:
        - departing_from
        - destination
        - start_date
        - end_date
        - destination_longitude
        - destination_latitude
      description: |
        The owner comes from the session, not the body. Coordinates are
        range-validated (not required), so 0,0 is technically accepted.
      properties:
        departing_from:
          type: string
          maxLength: 512
        destination:
          type: string
          maxLength: 512
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        destination_longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        destination_latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        note:
          type:
            - string
            - 'null'
        link:
          type:
            - string
            - 'null'
        link_company:
          type:
            - string
            - 'null'
        share_to_all:
          type: boolean
        share_to_connections:
          type: boolean
        contact_ids:
          type: array
          items:
            type: string
            format: uuid
        team_ids:
          type: array
          items:
            type: string
            format: uuid
        private:
          type: boolean
    UpdateTravelRequest:
      type: object
      required:
        - departing_from
        - destination
        - start_date
        - end_date
        - destination_longitude
        - destination_latitude
      description: |
        Full replace of the user-editable fields. contact_ids and team_ids
        replace the travel's companions and team shares; an omitted/empty list
        clears that relation.
      properties:
        departing_from:
          type: string
          maxLength: 512
        destination:
          type: string
          maxLength: 512
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
        destination_longitude:
          type: number
          format: double
          minimum: -180
          maximum: 180
        destination_latitude:
          type: number
          format: double
          minimum: -90
          maximum: 90
        note:
          type:
            - string
            - 'null'
        link:
          type:
            - string
            - 'null'
        link_company:
          type:
            - string
            - 'null'
        share_to_all:
          type: boolean
        share_to_connections:
          type: boolean
        contact_ids:
          type: array
          items:
            type: string
            format: uuid
        team_ids:
          type: array
          items:
            type: string
            format: uuid
        private:
          type: boolean
    FileResponse:
      type: object
      required:
        - id
        - gcs_uri
        - file_source
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        gcs_uri:
          type: string
        file_source:
          type: string
        data_source:
          type: string
        file_name:
          type: string
          description: Populated by the worker after GCS stat.
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        preview_image_url:
          type: string
          format: uri
        classification:
          type: string
          description: LLM-assigned file type (e.g. pitch_deck, term_sheet).
        status:
          type: string
          description: |
            Pipeline status. Common values: pending, extracting, classifying,
            classified, completed, failed.
        xano_user_id:
          type: integer
          format: int64
        xano_file_id:
          type: integer
          format: int64
        suggestion_request_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListFilesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        next_cursor:
          type: string
          description: Opaque cursor; omitted/empty when no further pages exist.
    CreateFileRequest:
      type: object
      required:
        - gcs_uri
        - file_source
        - data_source
      properties:
        gcs_uri:
          type: string
          description: |
            Full GCS URI of the uploaded object (e.g. `gs://bucket/path/to.pdf`).
            The worker reads metadata (name, mime, size) from the object.
        file_source:
          type: string
          maxLength: 255
          description: Free-form source label, e.g. "linkedin-import", "manual-upload".
        data_source:
          type: string
          maxLength: 64
          description: |
            Xano datasource scope — live | staging | sandbox | etc.
            Required because every file currently originates from a Xano-managed source.
        xano_user_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano user id pass-through. Body wins over JWT when both are present.
        file_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano file id pass-through (round-tripped to webhooks).
        suggestion_request_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano suggestion-request id (only set for suggestion-flow ingestions).
    EventTypesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: string
    SubscriptionResponse:
      type: object
      required:
        - id
        - environment
        - event_type
        - url
        - enabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type:
            - string
            - 'null'
          format: uuid
        organization_id:
          type:
            - string
            - 'null'
          format: uuid
        environment:
          type: string
        event_type:
          type: string
        url:
          type: string
          format: uri
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListSubscriptionsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SubscriptionResponse'
    CreateSubscriptionRequest:
      type: object
      required:
        - environment
        - event_type
        - url
      properties:
        environment:
          type: string
          maxLength: 64
          description: Logical environment (e.g. live, staging, sandbox).
        event_type:
          type: string
          maxLength: 128
          description: One of the values returned by GET /webhooks/event-types.
        url:
          type: string
          format: uri
          description: Destination HTTPS endpoint that will receive deliveries.
        enabled:
          type:
            - boolean
            - 'null'
          description: Defaults to true when omitted.
    CreateSubscriptionWithSecretResponse:
      allOf:
        - $ref: '#/components/schemas/SubscriptionResponse'
        - type: object
          required:
            - secret
          properties:
            secret:
              type: string
              description: |
                HMAC signing secret. Returned **only on create** — store
                this immediately; later GETs will not include it. Used
                to verify the X-Webhook-Signature header on deliveries.
    UpdateSubscriptionRequest:
      type: object
      required:
        - url
        - enabled
      properties:
        url:
          type: string
          format: uri
        enabled:
          type: boolean
    DeliveryResponse:
      type: object
      required:
        - id
        - subscription_id
        - event_id
        - status
        - attempts
        - max_attempts
        - created_at
      properties:
        id:
          type: string
          format: uuid
        subscription_id:
          type: string
          format: uuid
        event_id:
          type: string
        status:
          type: string
          description: |
            Delivery state. Common values: pending, in_progress, succeeded,
            failed, dead.
        attempts:
