                $ref: '#/components/schemas/DeliveryResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
  /contacts:
    get:
      operationId: listContacts
      tags:
        - Contacts
      summary: List the caller's contacts with person summaries
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated contact list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ContactWithSummary'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                      total:
                        type: integer
                      next_cursor:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: addContact
      tags:
        - Contacts
      summary: Add a master person as a contact (copy-to-my)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - master_person_id
              properties:
                master_person_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Contact already existed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AddContactResult'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AddContactResult'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /contacts/{contact_id}:
    get:
      operationId: getContact
      tags:
        - Contacts
      summary: Get a single contact with person summary
      security:
        - bearerAuth: []
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Contact detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContactWithSummary'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /merge-suspects:
    get:
      operationId: listMergeSuspects
      tags:
        - MergeSuspects
      summary: List the caller's active merge suspect pairs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of suspected duplicate contact pairs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MergeSuspect'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                      total:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: WorkOS access token returned by /sign-in or /verify-email.
  schemas:
    Meta:
      type: object
      properties:
        requestId:
          type: string
        page:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        total:
          type: integer
          format: int64
    ErrorDetail:
      type: object
      required:
        - field
        - issue
      properties:
        field:
          type: string
        issue:
          type: string
    ApiError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Stable machine code — NOT_FOUND / VALIDATION_FAILED / CONFLICT / UNAUTHORIZED / FORBIDDEN / INTERNAL.
        message:
          type: string
        details:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        debug:
          type:
            - string
            - 'null'
          description: Wrapped technical cause; present only in debug mode.
    ErrorEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      description: Error response — data is always null.
      properties:
        data:
          type: 'null'
        error:
          $ref: '#/components/schemas/ApiError'
        meta:
          $ref: '#/components/schemas/Meta'
    EmptyEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      description: Success with no payload (e.g. deletes) — data and error are null.
      properties:
        data:
          type: 'null'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    SignUpRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 128
        first_name:
          type:
            - string
            - 'null'
          maxLength: 128
        last_name:
          type:
            - string
            - 'null'
          maxLength: 128
        timezone:
          type:
            - string
            - 'null'
          maxLength: 64
          description: IANA timezone, e.g. "America/New_York".
    UserResponse:
      type: object
      required:
        - id
        - active_account
        - copilot_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        master_person_id:
          type:
            - string
            - 'null'
          format: uuid
        username:
          type:
            - string
            - 'null'
        workos_id:
          type:
            - string
            - 'null'
        graph_id:
          type:
            - string
            - 'null'
        primary_timezone:
          type:
            - string
            - 'null'
        active_account:
          type: boolean
        copilot_enabled:
          type: boolean
        last_activity:
          type:
            - string
            - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthTokensResponse:
      type: object
      required:
        - user
        - access_token
        - refresh_token
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        access_token:
          type: string
          description: 'Send as Authorization: Bearer on subsequent requests.'
        refresh_token:
          type: string
    SignUpResponse:
      type: object
      required:
        - user
        - email_verification_required
        - pending_authentication_token
        - email_verification_id
        - tokens
      properties:
        user:
          $ref: '#/components/schemas/UserResponse'
        email_verification_required:
          type: boolean
          description: When true, post pending_authentication_token + the emailed code to /verify-email.
        pending_authentication_token:
          type: string
          description: Token for /verify-email. Empty when verification is not required.
        email_verification_id:
          type: string
        tokens:
          oneOf:
            - $ref: '#/components/schemas/AuthTokensResponse'
            - type: 'null'
          description: Set (and the user logged in) only when verification was not required; null otherwise.
    SignUpResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/SignUpResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    SignInRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          maxLength: 128
        timezone:
          type:
            - string
            - 'null'
          maxLength: 64
    AuthTokensResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/AuthTokensResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    EmailVerificationRequiredResponse:
      type: object
      required:
        - error
        - message
        - pending_authentication_token
      properties:
        error:
          type: string
          example: email_verification_required
        message:
          type: string
        pending_authentication_token:
          type: string
        email_verification_id:
          type: string
    EmailVerificationRequiredResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/EmailVerificationRequiredResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
