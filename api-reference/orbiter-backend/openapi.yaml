        '500':
          $ref: '#/components/responses/Internal'
  /teams/{team_id}:
    get:
      tags:
        - Teams
      summary: Get one team
      description: |
        Returns a single team. The authenticated user must be a member of the team (any
        status); a non-member or an unknown team returns 404 so a team's
        existence isn't leaked to outsiders.
      operationId: getTeam
      security:
        - bearerAuth: []
