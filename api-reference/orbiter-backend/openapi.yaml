  /webhooks/deliveries:
    get:
      tags:
        - Webhooks
      summary: List dead-lettered deliveries
      description: |
        Today only `status=dead` is supported — surfacing the dead pile
        is the only listing affordance v2.0 promises. Other filters
        will follow once the operator UI grows.
      operationId: listWebhookDeliveries
      security: []
      parameters:
        - in: query
          name: status
          required: true
          schema:
            type: string
            enum:
              - dead
          description: Only `dead` is accepted today.
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - in: query
