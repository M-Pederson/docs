      summary: Delete a graph-instance credentials row
      description: |
        Deletes an instance by id. `mode=admin` deletes any row; `mode=user`
        (default) deletes only if the row belongs to the caller. Unknown id
        (or not owned, in user mode) returns 404.
      operationId: deleteFalkorDBInstance
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: mode
          required: false
          schema:
            type: string
            enum:
              - admin
