  /activities:
    get:
      tags:
        - Activities
      summary: Get the activity feed
      description: |
        Returns the authenticated user's contact activity feed, grouped by day
        (newest-first), one card per contact at their last-touch day. Walks back
        over a 9-day window from the time_range anchor. When show_empty_orbits is
        off it stops early at the oldest non-empty day (up to 9); when on it emits
        all 9 calendar days, empty days included.
      operationId: getActivityFeed
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: time_range
          required: false
          description: Upper bound of the walk. "now" (default), an RFC3339 timestamp, or a YYYY-MM-DD date.
          schema:
            type: string
            default: now
      responses:
        '200':
          description: The day-grouped activity feed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityFeedEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /teams:
    get:
      tags:
        - Teams
      summary: Get all teams
      description: |
        Returns a page of the teams the authenticated user is an accepted
        member of, newest first. Each item carries the team's total member
        count and the authenticated user's own membership. `with_favourites=false` excludes
        teams the authenticated user has favourited; `query` is a case-insensitive title
        substring search.
      operationId: listTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Case-insensitive team-title substring filter.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
          description: Page size (per_page).
        - in: query
          name: with_favourites
          required: false
          schema:
            type: boolean
            default: true
          description: When false, excludes the authenticated user's favourited teams.
      responses:
        '200':
          description: A page of the authenticated user's teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListTeamsResponseEnvelope'
        '400':
