    post:
      tags:
        - Emails
      summary: Create a email draft
      description: |
        Creates an outbound email draft for the authenticated user and stores
        any attachments to GCS. Recipients (to/cc/bcc) are resolved to display
        names from persons where known. The owner is taken from the
        verified session (urn:orbiter:user_id claim), not the body.

        Sent as multipart/form-data: repeated `to` / `cc` / `bcc` text fields
        for addresses and repeated `attachments` file parts. The total request
        body is capped at 25 MB.

        NOTE: the Nylas sync is not yet wired — the draft is returned with
        status `draft` and a null `nylas_draft_id` until the Nylas integration
        lands.
      operationId: createEmailDraft
      security:
        - bearerAuth: []
      requestBody:
        required: true
