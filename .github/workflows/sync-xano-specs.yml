name: Sync Xano OpenAPI Specs

on:
  # Triggered by Xano webhook via repository_dispatch
  repository_dispatch:
    types: [xano-api-updated]

  # Manual trigger from GitHub Actions UI
  workflow_dispatch:

  # Daily fallback sync at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Run sync script
        run: node scripts/sync-xano-specs.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet api-reference/ docs.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add api-reference/ docs.json
          git commit -m "chore: sync Xano API docs

          Auto-synced MDX API documentation from Xano.
          Triggered by: ${{ github.event_name }}"
          git push
