        OR collaborates on (via email_collaborators), deduplicated and newest
        first — for infinite scroll. Pass the previous page's `next_cursor`
        back as `cursor` to fetch the next page; an empty `next_cursor` means
        no more results.
      operationId: listEmailTemplates
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: cursor
          required: false
          description: Opaque cursor from a previous response's next_cursor.
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
