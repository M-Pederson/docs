      properties:
        data:
          $ref: '#/components/schemas/CollectionNodeAssignment'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    RateCollectionNodeRequest:
      type: object
      required:
        - user_id
        - rating
      description: Rate a node 1-5 on behalf of user_id.
      properties:
        user_id:
          type: string
          format: uuid
          description: The user the rating is recorded for.
        rating:
          type: integer
          format: int32
          minimum: 1
          maximum: 5
    CollectionNodeRatingSummary:
      type: object
      required:
        - average
        - rater_count
      description: A node's aggregate score after a rating.
      properties:
        average:
          type: number
          format: double
          description: Mean score (full precision; the node stores it rounded to 1dp).
        rater_count:
          type: integer
          format: int64
          description: Number of distinct raters.
    CollectionNodeRatingSummaryEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/CollectionNodeRatingSummary'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    FileResponse:
      type: object
      required:
        - id
        - gcs_uri
        - file_source
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        gcs_uri:
          type: string
        file_source:
          type: string
        data_source:
          type: string
        file_name:
          type: string
          description: Populated by the worker after GCS stat.
        mime_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        preview_image_url:
          type: string
          format: uri
        classification:
          type: string
          description: LLM-assigned file type (e.g. pitch_deck, term_sheet).
        status:
          type: string
          description: |
            Pipeline status. Common values: pending, extracting, classifying,
            classified, completed, failed.
        xano_user_id:
          type: integer
          format: int64
        xano_file_id:
          type: integer
          format: int64
        suggestion_request_id:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ListFilesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/FileResponse'
        next_cursor:
          type: string
          description: Opaque cursor; omitted/empty when no further pages exist.
    ListFilesResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/ListFilesResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    CreateFileRequest:
      type: object
      required:
        - gcs_uri
        - file_source
        - data_source
      properties:
        gcs_uri:
          type: string
          description: |
            Full GCS URI of the uploaded object (e.g. `gs://bucket/path/to.pdf`).
            The worker reads metadata (name, mime, size) from the object.
        file_source:
          type: string
          maxLength: 255
          description: Free-form source label, e.g. "linkedin-import", "manual-upload".
        data_source:
          type: string
          maxLength: 64
          description: |
            Xano datasource scope — live | staging | sandbox | etc.
            Required because every file currently originates from a Xano-managed source.
        xano_user_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano user id pass-through. Body wins over JWT when both are present.
        file_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano file id pass-through (round-tripped to webhooks).
        suggestion_request_id:
          type:
            - integer
            - 'null'
          format: int64
          description: Xano suggestion-request id (only set for suggestion-flow ingestions).
    FileResponseEnvelope:
      type: object
      required:
        - data
        - error
        - meta
      properties:
        data:
          $ref: '#/components/schemas/FileResponse'
        error:
          type: 'null'
        meta:
          $ref: '#/components/schemas/Meta'
    EventTypesResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            type: string
    EventTypesResponseEnvelope:
      type: object
      required:
        - data
