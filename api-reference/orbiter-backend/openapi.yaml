      operationId: deleteCollectionQuestion
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_question_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Question deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
