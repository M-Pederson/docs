  /collection-favourites/reorder:
    patch:
      tags:
        - Collections
      summary: Reorder favourites
      description: |
        Sets the authenticated user's favourites to the submitted order — each collection's
        position becomes its index in collection_ids. Every id must already be
        one of the authenticated user's favourites; otherwise the whole reorder is rejected.
      operationId: reorderCollectionFavourites
      security:
