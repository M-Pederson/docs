        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/Internal'
    put:
      tags:
        - Discover
      summary: Update a discover record
      description: |
        Replaces a discover's `query` and `archived` flag and stamps the
        authenticated caller as the record's owner. `edges` / `path_keys` /
        `answer` / `processing` are left untouched. Auth-gated but not
        owner-scoped: any signed-in caller can update any record by id. Unknown
        ids return 404.
      operationId: updateDiscover
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: discover_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverUpdateRequest'
      responses:
