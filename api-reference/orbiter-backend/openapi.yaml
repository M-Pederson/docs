    get:
      tags:
        - Teams
      summary: Get all team favourites
      description: |
        Returns the teams the authenticated user has favourited (accepted
        membership with is_favourite=true), in the authenticated user's custom order
        (membership position ascending). Optionally filtered by a case-insensitive
        title substring. Unpaginated. Each item is the same shape as a GET /teams
        item — every one is, by definition, a favourite.
      operationId: listFavouriteTeams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: query
          required: false
          schema:
            type: string
          description: Case-insensitive team-title substring filter.
      responses:
        '200':
          description: The authenticated user's favourited teams.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FavouriteTeamsResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
    patch:
      tags:
        - Teams
      summary: Toggle a team favourite
      description: |
        Sets the authenticated authenticated user's `is_favourite` flag on their own
        membership in the team named by `team_id`, and maintains the contiguous
        position order their favourites list relies on: favouriting appends the
        team to the end of their favourites (keeping its place if already a
        favourite); unfavouriting clears its slot and re-compacts the rest.
        Returns the updated membership. 404 when the authenticated user is not a member.
      operationId: patchTeamFavourite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchTeamFavouriteRequest'
