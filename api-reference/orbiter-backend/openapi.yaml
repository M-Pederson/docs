                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /contacts/clone:
    post:
      operationId: cloneContacts
      tags:
        - Contacts
      summary: Clone contacts from a donor
      description: |
        Duplicates the contact rows of a randomly chosen donor (one of the users holding the most contacts) into the authenticated user's account. Only the contacts rows are cloned; existing contacts are left untouched and donor data is not deleted. Idempotent — contacts the authenticated user already holds are skipped.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Contacts cloned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CloneContactsResult'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /contacts/{contact_id}:
    get:
      operationId: getContact
      tags:
        - Contacts
      summary: Get one contact
      description: Get a single contact with person summary
      security:
        - bearerAuth: []
      parameters:
        - name: contact_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Contact detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ContactWithSummary'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /companies:
    get:
      operationId: listCompanies
      tags:
        - Companies
      summary: Get all companies
      description: Browse all companies with the authenticated user's company state
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 200
        - name: cursor
          in: query
          schema:
            type: string
        - name: query
          in: query
          description: Case-insensitive company-name filter.
          schema:
            type: string
        - name: node_uuid
          in: query
          description: Exact match on the company's graph node id (`graph_node_id`). Lets graph surfaces resolve a node to its master company.
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order. `created_at` is newest-first; `name` is company name A-Z.
          schema:
            type: string
            enum:
              - created_at
              - name
            default: created_at
        - name: created_after
          in: query
          description: Only companies created at or after this RFC3339 timestamp (inclusive).
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          description: Only companies created at or before this RFC3339 timestamp (inclusive).
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated master-company list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Company'
                  error:
                    type:
                      - object
                      - 'null'
                  meta:
                    type: object
                    properties:
                      request_id:
                        type: string
                      total:
                        type: integer
                      next_cursor:
                        type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /companies/{company_id}:
    get:
      operationId: getCompany
      tags:
        - Companies
