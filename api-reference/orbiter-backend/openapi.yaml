      operationId: updateCollectionQuestion
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: collection_question_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCollectionQuestionRequest'
