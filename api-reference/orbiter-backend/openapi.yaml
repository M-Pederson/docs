        '201':
          description: The reaction (created or updated).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionReactionEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
