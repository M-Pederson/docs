    patch:
      tags:
        - Teams
      summary: Reorder favourite teams
      description: |
        Assigns the authenticated user's favourited teams the order given by `team_ids` (first
        → position 0, second → 1, …). Every id must be one of the authenticated user's
        favourited teams; a non-matching id rejects the whole request (400) and
