          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Backfill counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/backfill/companies:
    post:
      tags:
        - Organizations
      summary: 'Backfill: company links'
      description: |
        Links organizations with no `company_id` to a master
        company by matching their claimed domain, then re-syncs the
        per-org graph so the :MasterOrganization mirror lands. `failed`
        includes orgs whose domain matches no company. Idempotent.
      operationId: backfillOrganizationMasterCompanies
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Backfill counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/backfill/external-ids:
    post:
      tags:
        - Organizations
      summary: 'Backfill: external ids'
      description: |
        Scans WorkOS organizations and stamps each one missing an
        `external_id` with its local org id (matched on
        `workos_organization_id`). `failed` counts WorkOS orgs with no
        local row. Idempotent.
      operationId: backfillOrganizationExternalIDs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 100
      responses:
        '200':
          description: Backfill counts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/webhooks/workos-memberships:
    post:
      tags:
        - Organizations
      summary: 'Webhook: WorkOS memberships'
      description: |
        Receives WorkOS `organization_membership.created/updated/deleted`
        events and syncs the local membership table and graphs. Verified
        via the `WorkOS-Signature` HMAC header, not a bearer token.
        Idempotent under WorkOS retries (upsert keyed on
        `workos_membership_id`). A member not yet provisioned locally
        returns 500 on purpose so WorkOS retries after the user webhook
        lands. Unknown event types return 200 with action "ignored".
      operationId: workosMembershipWebhook
      security: []
      parameters:
        - in: header
          name: WorkOS-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw WorkOS event envelope ({ event, data }).
      responses:
        '200':
          description: Event processed (or ignored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MembershipWebhookResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /organizations/webhooks/workos-organizations:
    post:
      tags:
        - Organizations
      summary: 'Webhook: WorkOS organizations'
      description: |
        Receives WorkOS `organization.created/updated/deleted` events and
        syncs the local organizations table and graph. Verified via the
        `WorkOS-Signature` HMAC header (its own signing secret, distinct
        from the membership endpoint), not a bearer token. Idempotent under
        WorkOS retries (upsert keyed on `workos_organization_id`).
        `organization.updated` for an unknown org is skipped, not created,
        so out-of-order delivery can't resurrect a deleted org. Unknown
        event types return 200 with action "ignored".
      operationId: workosOrganizationWebhook
      security: []
      parameters:
        - in: header
          name: WorkOS-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw WorkOS event envelope ({ event, data }).
      responses:
        '200':
          description: Event processed (or ignored).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationWebhookResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /getstream/webhooks/message-new:
    post:
      tags:
        - GetStream
      summary: 'Webhook: message.new'
      description: |
        Receives GetStream (Stream Chat) `message.new` events and records each
        message as a comment on the entity named by the channel id. Verified via
        the `X-Signature` HMAC header (HMAC-SHA256 of the raw body under the app
        API secret), not a bearer token.

        The channel id is `<kind>-<id>`: `collection-<uuid>`, `note-<uuid>`,
        `email-template-<uuid>`, or `email-thread-<thread_id>`. The message
        author (`message.user.id`) is the local `users.id` UUID; an
        unprovisioned author is recorded with a null `user_id`.

        Idempotent under GetStream retries (keyed on `message.id` /
        `getstream_message_id`). Non-`message.new` events, unknown channel
        prefixes, and unroutable ids return 200 (acked, no-op) so GetStream
        does not retry a permanently-unroutable event.
      operationId: getstreamMessageNew
      security: []
      parameters:
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GetStream event envelope ({ type, channel_id, message }).
              properties:
                type:
                  type: string
                  example: message.new
                channel_id:
                  type: string
                  example: collection-018f9c2e-7b3a-7e21-9c0a-1f2e3d4c5b6a
                message:
                  type: object
                  properties:
                    id:
                      type: string
                    text:
                      type: string
                    user:
                      type: object
                      properties:
                        id:
                          type: string
      responses:
        '200':
          description: Event recorded, acked, or ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /getstream/webhooks/message-updated:
    post:
      tags:
        - GetStream
      summary: 'Webhook: message.updated'
      description: |
        Receives GetStream `message.updated` events and edits the comment
        carrying `message.id` (keyed on `getstream_message_id`) in the table
        named by the channel. HMAC-verified via `X-Signature`, no bearer auth.
        No-op (still 200) when no comment matches.
      operationId: getstreamMessageUpdated
      security: []
      parameters:
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GetStream event envelope ({ type, channel_id, message }).
      responses:
        '200':
          description: Comment updated, acked, or ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /getstream/webhooks/message-deleted:
    post:
      tags:
        - GetStream
      summary: 'Webhook: message.deleted'
      description: |
        Receives GetStream `message.deleted` events and deletes the comment
        carrying `message.id` (keyed on `getstream_message_id`) in the table
        named by the channel. HMAC-verified via `X-Signature`, no bearer auth.
        No-op (still 200) when no comment matches.
      operationId: getstreamMessageDeleted
      security: []
      parameters:
        - in: header
          name: X-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: GetStream event envelope ({ type, channel_id, message }).
      responses:
        '200':
          description: Comment deleted, acked, or ignored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmptyEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/Internal'
  /notes:
